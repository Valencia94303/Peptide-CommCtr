    // ═══════════════════════════════════════════════════════════════

    // ═══════════════════════════════════════════════════════════════
    //  PPTX EXPORT
    // ═══════════════════════════════════════════════════════════════

    function exportToPPTX(slides, userName) {
        const pptx = new PptxGenJS();
        pptx.layout = 'LAYOUT_WIDE';
        pptx.author = 'Peptide Command Center';
        pptx.subject = userName + ' Onboarding Protocol';

        slides.forEach(function (slide, idx) {
            const s = pptx.addSlide();
            s.background = { fill: '0b0e14' };

            // Slide label (top-left)
            s.addText(slide.label.toUpperCase(), {
                x: 0.6, y: 0.35, w: 4, h: 0.3,
                color: '4a5568', fontSize: 9, fontFace: 'Arial', bold: true, letterSpacing: 3
            });

            // Big Idea title
            s.addText(slide.bigIdea, {
                x: 0.6, y: 0.8, w: 12, h: 0.8,
                color: '00d4ff', fontSize: 32, fontFace: 'Arial', bold: true
            });

            // Subtitle
            if (slide.subtitle) {
                s.addText(slide.subtitle, {
                    x: 0.6, y: 1.6, w: 12, h: 0.5,
                    color: '7dd3fc', fontSize: 16, fontFace: 'Arial'
                });
            }

            // Bullets
            var bulletRows = slide.bullets.map(function (b) {
                var line = b.icon + '  ' + b.text;
                if (b.detail) line += ' \u2014 ' + b.detail;
                return { text: line, options: { fontSize: 14, color: 'FFFFFF', fontFace: 'Arial', breakLine: true, paraSpaceAfter: 8 } };
            });

            s.addText(bulletRows, {
                x: 0.6, y: 2.3, w: 12, h: 4.5,
                valign: 'top'
            });

            // Slide number (bottom-right)
            s.addText((idx + 1) + ' / ' + slides.length, {
                x: 10.5, y: 7.0, w: 2.5, h: 0.3,
                color: '4a5568', fontSize: 9, fontFace: 'Arial', align: 'right'
            });
        });

        pptx.writeFile({ fileName: userName + ' - Onboarding Protocol.pptx' });
    }

    // ═══════════════════════════════════════════════════════════════
    //  FRAMER-MOTION VARIANTS
    // ═══════════════════════════════════════════════════════════════

    const slideVariants = {
        enter: function (dir) { return { x: dir > 0 ? 280 : -280, opacity: 0 }; },
        center: { x: 0, opacity: 1 },
        exit: function (dir) { return { x: dir > 0 ? -280 : 280, opacity: 0 }; }
    };

    // ═══════════════════════════════════════════════════════════════
    //  ONBOARDING PRESENTATION COMPONENT
    // ═══════════════════════════════════════════════════════════════

    function OnboardingApp() {
        const params = useParams();
        const navigate = useNavigate();
        const userId = (params.userId || '').toLowerCase();

        const isV2 = userId === 'daisy-v2';
        const protocol = isV2 ? PROTOCOLS['daisy'] : PROTOCOLS[userId];
        const [current, setCurrent] = useState(0);
        const [direction, setDirection] = useState(1);

        // Keyboard nav
        useEffect(function () {
            function onKey(e) {
                if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
                if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
            }
            window.addEventListener('keydown', onKey);
            return function () { window.removeEventListener('keydown', onKey); };
        });

        // Touch swipe
        const [touchStart, setTouchStart] = useState(null);
        function onTouchStart(e) { setTouchStart(e.touches[0].clientX); }
        function onTouchEnd(e) {
            if (touchStart === null) return;
            const diff = touchStart - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 60) { diff > 0 ? goNext() : goPrev(); }
            setTouchStart(null);
        }

        if (!protocol) {
            return html`<div className="max-w-lg mx-auto min-h-screen flex flex-col items-center justify-center p-6 text-center">
                <div className="text-5xl mb-4">\u{26A0}</div>
                <h1 className="text-2xl font-bold text-gradient mb-2">User Not Found</h1>
                <p className="text-gray-400 mb-6">No protocol found for "<span className="text-amber-400">${params.userId}</span>"</p>
                <button onClick=${function () { navigate('/'); }} className="btn-primary px-8 py-3">Choose a User</button>
            </div>`;
        }

        const slides = isV2 ? DAISY_V2_SLIDES : generateSlides(protocol);
        const slide = slides[current];

        function goTo(idx) {
            if (idx < 0 || idx >= slides.length || idx === current) return;
            setDirection(idx > current ? 1 : -1);
            setCurrent(idx);
        }
        function goNext() { goTo(current + 1); }
        function goPrev() { goTo(current - 1); }

        const progressPct = ((current + 1) / slides.length) * 100;

        return html`<div className="max-w-3xl mx-auto min-h-screen flex flex-col"
            onTouchStart=${onTouchStart} onTouchEnd=${onTouchEnd}>

            <!-- Progress bar -->
            <div className="h-1 bg-gray-900 shrink-0">
                <div className="h-full bg-gradient-to-r from-amber-600 to-amber-400 transition-all duration-500 ease-out"
                    style=${{ width: progressPct + '%' }}></div>
            </div>

            <!-- Header -->
            <div className="glass-header px-4 py-3 flex items-center justify-between shrink-0">
                <a href="index.html" className="text-gray-500 hover:text-gray-300 text-sm font-medium transition">\u2190 App</a>
                <div className="text-center">
                    <span className="text-xs font-bold text-gradient">${protocol.emoji} ${protocol.name}'s Onboarding${isV2 ? ' v2' : ''}</span>
                    <span className="block text-[10px] text-gray-600 font-mono">${current + 1} / ${slides.length}</span>
                </div>
                <button onClick=${function () { exportToPPTX(slides, protocol.name + (isV2 ? ' v2' : '')); }}
                    className="text-xs font-semibold px-3 py-1.5 rounded-lg bg-gray-800 border border-gray-700 text-gray-300 hover:border-amber-500/40 hover:text-amber-400 transition"
                    title="Download PowerPoint">
                    \u{2B07} .pptx
                </button>
            </div>

            <!-- Slide Content -->
            <div className="flex-1 flex items-center justify-center px-5 py-6 overflow-hidden" style=${{ minHeight: '0' }}>
                <${AnimatePresence} mode="wait" custom=${direction}>
                    <${MDiv}
                        key=${current}
                        custom=${direction}
                        variants=${slideVariants}
                        initial="enter"
                        animate="center"
                        exit="exit"
                        transition=${{ duration: 0.35, ease: [0.25, 0.1, 0.25, 1] }}
                        className="w-full"
                    >
                        <!-- Label -->
                        <${MDiv}
                            initial=${{ opacity: 0, y: -10 }}
                            animate=${{ opacity: 1, y: 0 }}
                            transition=${{ delay: 0.1 }}
                            className="text-[10px] uppercase tracking-[0.2em] text-amber-500/60 font-bold mb-2"
                        >
                            ${slide.label}
                        </${MDiv}>

                        <!-- Big Idea (Scale-up) -->
                        <${MDiv}
                            initial=${{ opacity: 0, scale: 0.82 }}
                            animate=${{ opacity: 1, scale: 1 }}
                            transition=${{ delay: 0.12, duration: 0.5, type: 'spring', stiffness: 180, damping: 18 }}
                            className="mb-1"
                        >
                            <h1 className="text-3xl md:text-4xl font-extrabold text-gradient leading-tight">
                                ${slide.bigIdea}
                            </h1>
                        </${MDiv}>

                        <!-- Subtitle -->
                        ${slide.subtitle && html`
                            <${MDiv}
                                initial=${{ opacity: 0 }}
                                animate=${{ opacity: 1 }}
                                transition=${{ delay: 0.25 }}
                                className="text-gray-400 text-sm md:text-base mb-5"
                            >
                                ${slide.subtitle}
                            </${MDiv}>
                        `}

                        <!-- Bullets (Slide-in) -->
                        <div className="space-y-2.5 mt-4">
                            ${slide.bullets.map(function (bullet, i) {
                                const isAlert = bullet.alert;
                                return html`
                                    <${MDiv}
                                        key=${i}
                                        initial=${{ opacity: 0, x: -30 }}
                                        animate=${{ opacity: 1, x: 0 }}
                                        transition=${{ delay: 0.28 + i * 0.07, duration: 0.35, ease: 'easeOut' }}
                                        className=${'flex items-start gap-3 p-3 rounded-xl transition ' + (isAlert ? 'alert-row' : 'bullet-row')}
                                    >
                                        <span className="text-base mt-0.5 shrink-0">${bullet.icon || '\u{25CF}'}</span>
                                        <div className="min-w-0">
                                            <span className=${'font-medium ' + (isAlert ? 'text-red-300' : 'text-gray-100')}>${bullet.text}</span>
                                            ${bullet.detail && html`
                                                <span className="block text-gray-500 text-xs mt-0.5">${bullet.detail}</span>
                                            `}
                                        </div>
                                    </${MDiv}>
                                `;
                            })}
                        </div>
                    </${MDiv}>
                </${AnimatePresence}>
            </div>

            <!-- Navigation -->
            <div className="px-4 py-3 border-t border-gray-800/60 shrink-0 pb-safe">
                <div className="flex items-center justify-between gap-3">
                    <button
                        onClick=${goPrev}
                        disabled=${current === 0}
                        className=${'px-5 py-2.5 rounded-xl font-semibold text-sm transition ' + (current === 0 ? 'bg-gray-800/40 text-gray-700 cursor-not-allowed' : 'bg-gray-800 text-gray-300 hover:bg-gray-700 active:scale-95')}
                    >
                        \u2190 Prev
                    </button>

                    <div className="flex gap-1.5 flex-wrap justify-center">
                        ${slides.map(function (_, i) {
                            const active = i === current;
                            return html`<button key=${i} onClick=${function () { goTo(i); }}
                                className=${'h-2 rounded-full transition-all duration-300 ' + (active ? 'w-6 bg-amber-500' : 'w-2 bg-gray-700 hover:bg-gray-600')}
                            ></button>`;
                        })}
                    </div>

                    <button
                        onClick=${goNext}
                        disabled=${current === slides.length - 1}
                        className=${'px-5 py-2.5 rounded-xl font-semibold text-sm transition ' + (current === slides.length - 1 ? 'bg-gray-800/40 text-gray-700 cursor-not-allowed' : 'btn-primary active:scale-95')}
                    >
                        Next \u2192
                    </button>
                </div>
            </div>
        </div>`;
    }
