// ║              13b. WEEKLY SHOT SCHEDULE                      ║
// ╚══════════════════════════════════════════════════════════════╝

async function renderShotsSchedule() {
    if (!currentProfile) return;
    const p = currentProfile;
    const sched = getSchedule(p);
    const doses = p.current_doses || {};

    // Pull this week's logs (Sun..Sat containing today) so we can show actual amounts.
    const today = todayStr();
    const todayDow = new Date(today + 'T12:00:00').getDay();
    const sunday = shiftDate(today, -todayDow);
    const saturday = shiftDate(sunday, 6);
    let weekLogs = [];
    try {
        const { data } = await sb.from('daily_logs').select('log_date, shots')
            .eq('user_id', currentSession.user.id).gte('log_date', sunday).lte('log_date', saturday);
        weekLogs = data || [];
    } catch (e) { /* non-fatal */ }
    const logByDow = {};
    weekLogs.forEach(l => {
        const dow = new Date(l.log_date + 'T12:00:00').getDay();
        logByDow[dow] = l;
    });

    let html = `<div class="card"><div class="section-title">Your Peptide Stack</div>
        <div class="text-sm text-gray-300 mb-2">${p.peptide_type || 'Not configured'}</div>
        <div class="grid grid-cols-2 gap-2">`;
    Object.entries(doses).forEach(([name, mg]) => {
        const safe = name.replace(/'/g, "\\'");
        html += `<button onclick="showPeptideHistory('${safe}')" class="bg-gray-800 hover:bg-gray-700 rounded-lg p-2.5 text-center transition active:scale-95">
            <div class="text-amber-400 font-bold text-sm">${name}</div>
            <div class="text-white text-lg font-extrabold">${mg}mg</div>
            <div class="text-[10px] text-gray-500 uppercase tracking-wide mt-0.5">View history</div>
        </button>`;
    });
    html += `</div></div>`;

    html += `<div class="card"><div class="section-title">This Week's Shots</div>
        <p class="text-xs text-gray-500 mb-3">Week of ${formatDate(sunday)} &mdash; ${formatDate(saturday)} &bull; tap a peptide to see history.</p>
        <div class="space-y-3">`;

    for (let d = 0; d < 7; d++) {
        const day = sched[d];
        if (!day) continue;
        const dayDate = shiftDate(sunday, d);
        const isToday = d === todayDow;
        const isPast = dayDate < today;
        const isMorning = day.window === 'morning';
        const icon = isMorning ? '&#x1F305;' : '&#x1F319;';
        const windowLabel = isMorning ? 'Morning (Fasted)' : 'Evening (Bedtime)';
        const shots = day.shots || [];
        const hasShots = shots.length > 0;
        const dayLog = logByDow[d];

        html += `<div class="rounded-xl p-3 ${isToday ? 'bg-amber-900/20 border border-amber-700' : 'bg-gray-800/60 border border-gray-700/50'}">
            <div class="flex items-center justify-between mb-1.5">
                <div class="flex items-center gap-2">
                    <span class="font-bold text-sm ${isToday ? 'text-amber-400' : 'text-gray-300'}">${DAYS[d]}</span>
                    <span class="text-[10px] text-gray-500">${formatDateShort(dayDate)}</span>
                    ${isToday ? '<span class="text-[10px] font-bold text-amber-500 bg-amber-500/10 px-1.5 py-0.5 rounded">TODAY</span>' : ''}
                </div>
                <div class="flex items-center gap-1.5 text-xs">
                    <span>${icon}</span>
                    <span class="${isMorning ? 'text-blue-400' : 'text-purple-400'} font-medium">${windowLabel}</span>
                </div>
            </div>`;

        if (hasShots) {
            shots.forEach((peptide, idx) => {
                const planned = doses[peptide];
                const meta = getShotMeta(dayLog?.shots?.[peptide]);
                const logged = !!meta;
                const amountText = logged
                    ? (meta.mg != null && meta.units != null ? meta.mg + 'mg • ' + meta.units + 'u'
                        : meta.mg != null ? meta.mg + 'mg'
                        : meta.units != null ? meta.units + 'u'
                        : 'logged')
                    : (planned ? planned + 'mg planned' : '');
                const safe = peptide.replace(/'/g, "\\'");
                html += `<div class="flex items-center gap-2 py-1.5 ${idx > 0 ? 'border-t border-gray-700/40' : ''}" onclick="showPeptideHistory('${safe}')" style="cursor:pointer">
                    <span class="text-sm">${logged ? '&#x2705;' : (isPast ? '&#x274C;' : '&#x1F489;')}</span>
                    <span class="text-gray-100 font-medium text-sm flex-1">${peptide}</span>
                    <span class="${logged ? 'text-emerald-400' : 'text-amber-400'} font-bold text-xs">${amountText}</span>
                </div>`;
            });
            html += `<div class="text-xs text-gray-500 mt-1">${day.fasting}</div>`;
        } else {
            html += `<div class="text-gray-500 text-sm py-1">No shots scheduled</div>`;
        }
        html += `</div>`;
    }

    html += `</div></div>`;

    // Summary card
    let totalShots = 0;
    const peptideDays = {};
    for (let d = 0; d < 7; d++) {
        const shots = sched[d]?.shots || [];
        totalShots += shots.length;
        shots.forEach(pep => { if (!peptideDays[pep]) peptideDays[pep] = []; peptideDays[pep].push(DAYS_SHORT[d]); });
    }
    html += `<div class="card"><div class="section-title">Weekly Summary</div>
        <div class="text-sm text-gray-300 mb-3">${totalShots} total injections per week</div>
        <div class="space-y-2">`;
    Object.entries(peptideDays).forEach(([pep, days]) => {
        const safe = pep.replace(/'/g, "\\'");
        html += `<button onclick="showPeptideHistory('${safe}')" class="w-full flex items-center justify-between py-2 border-t border-gray-800 hover:bg-gray-800/40 transition text-left">
            <span class="text-gray-200 font-medium text-sm">${pep}</span>
            <span class="text-gray-400 text-xs">${days.join(', ')} (${days.length}x/wk) &rarr;</span>
        </button>`;
    });
    html += `</div></div>`;

    document.getElementById('shots-content').innerHTML = html;
}

async function showPeptideHistory(peptide) {
    if (!currentProfile) return;
    showModal('<div class="flex items-center justify-center py-12"><div class="spinner"></div></div>');
    try {
        const { data, error } = await sb.from('daily_logs')
            .select('log_date, shots')
            .eq('user_id', currentSession.user.id)
            .order('log_date', { ascending: false })
            .limit(365);
        if (error) throw error;
        const entries = [];
        let totalMg = 0, totalShots = 0;
        (data || []).forEach(l => {
            const v = l.shots ? l.shots[peptide] : null;
            const meta = getShotMeta(v);
            if (!meta) return;
            entries.push({ date: l.log_date, ...meta });
            totalShots++;
            if (meta.mg != null) totalMg += parseFloat(meta.mg) || 0;
        });

        let html = `<div class="text-center mb-4">
            <div class="text-3xl mb-2">&#x1F489;</div>
            <h3 class="text-lg font-bold text-amber-400">${peptide}</h3>
            <p class="text-xs text-gray-500">Injection history</p>
        </div>`;

        if (entries.length === 0) {
            html += `<div class="text-center py-8 text-gray-500 text-sm">No shots logged yet.</div>`;
        } else {
            html += `<div class="grid grid-cols-2 gap-2 mb-4">
                <div class="bg-gray-800 rounded-lg p-2.5 text-center">
                    <div class="text-white text-lg font-extrabold">${totalShots}</div>
                    <div class="text-[10px] text-gray-500 uppercase tracking-wide">Total shots</div>
                </div>
                <div class="bg-gray-800 rounded-lg p-2.5 text-center">
                    <div class="text-white text-lg font-extrabold">${totalMg.toFixed(2)}<span class="text-xs text-gray-400">mg</span></div>
                    <div class="text-[10px] text-gray-500 uppercase tracking-wide">Cumulative mg</div>
                </div>
            </div>`;
            html += `<div class="space-y-1.5 max-h-[50vh] overflow-y-auto">`;
            entries.forEach(e => {
                const time = e.at ? new Date(e.at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '';
                const amount = e.mg != null && e.units != null ? `${e.mg}mg • ${e.units}u`
                    : e.mg != null ? `${e.mg}mg`
                    : e.units != null ? `${e.units}u`
                    : 'logged';
                html += `<div class="flex items-center justify-between py-2 px-3 bg-gray-800/60 rounded-lg">
                    <div>
                        <div class="text-gray-100 text-sm font-medium">${formatDate(e.date)}</div>
                        ${time ? `<div class="text-[10px] text-gray-500">${time}</div>` : ''}
                    </div>
                    <div class="text-amber-400 font-bold text-sm">${amount}</div>
                </div>`;
            });
            html += `</div>`;
        }
        html += `<button onclick="closeModal()" class="btn-secondary mt-5">Close</button>`;
        showModal(html);
    } catch (e) {
        showModal(`<div class="text-red-400 text-center py-6">${e.message}</div><button onclick="closeModal()" class="btn-secondary mt-4">Close</button>`);
    }
}

const MEASURE_FIELDS = [
    { key: 'waist', label: 'Waist', unit: 'in' },
    { key: 'hips', label: 'Hips', unit: 'in' },
    { key: 'chest', label: 'Chest', unit: 'in' },

    { key: 'left_thigh', label: 'Left Thigh', unit: 'in' },
    { key: 'right_thigh', label: 'Right Thigh', unit: 'in' }
];

async function loadMeasurements() {
    const el = document.getElementById('measurements-content');
    el.innerHTML = '<div class="flex items-center justify-center py-16"><div class="spinner"></div></div>';
    try {
        const { data, error } = await sb.from('measurements').select('*')
            .eq('user_id', currentSession.user.id).order('measured_date', { ascending: false }).limit(30);
        if (error) throw error;

    } catch (e) {

            <p class="text-sm">Measurements not available yet.</p>
            <p class="text-xs text-gray-600 mt-1">Run migration-006-measurements.sql in Supabase.</p></div>`;
    }
}

function renderMeasurements(history) {
    let html = '';

    // Log new measurement form
    html += `<div class="card"><div class="section-title">Log Measurement</div>
        <div class="grid grid-cols-2 gap-3">`;
    MEASURE_FIELDS.forEach(f => {
        html += `<div><label class="label">${f.label} (${f.unit})</label>
            <input type="number" inputmode="decimal" step="0.1" class="input-field" id="meas-${f.key}" placeholder="0.0"></div>`;
    });
    html += `</div>
        <div class="mt-3"><label class="label">Date</label>
            <input type="date" class="input-field" id="meas-date" value="${todayStr()}">
        </div>
        <div class="mt-3"><label class="label">Notes (optional)</label>
            <input type="text" class="input-field" id="meas-notes" placeholder="e.g. Morning, post-workout" maxlength="200">
        </div>
        <button onclick="saveMeasurement()" class="btn-primary mt-4">Save Measurement</button>
    </div>`;

    // Trend summary (compare first vs latest)
    if (history.length >= 2) {
        const latest = history[0];
        const first = history[history.length - 1];
        html += `<div class="card"><div class="section-title">Changes Since ${formatDate(first.measured_date)}</div>
            <div class="grid grid-cols-2 gap-2">`;
        MEASURE_FIELDS.forEach(f => {
            const start = parseFloat(first[f.key]);
            const now = parseFloat(latest[f.key]);
            if (!start || !now) return;
            const diff = (now - start).toFixed(1);
            const color = diff < 0 ? 'text-emerald-400' : diff > 0 ? 'text-red-400' : 'text-gray-400';
            const arrow = diff < 0 ? '&darr;' : diff > 0 ? '&uarr;' : '&mdash;';
            html += `<div class="bg-gray-800 rounded-lg p-2.5 text-center">
                <div class="text-xs text-gray-500">${f.label}</div>
                <div class="text-white font-bold">${now}"</div>
                <div class="${color} text-xs font-bold">${arrow} ${Math.abs(diff)}"</div>
            </div>`;
        });
        html += `</div></div>`;
    }

    // History
    html += `<div class="card"><div class="section-title">History</div>`;
    if (history.length === 0) {
        html += '<div class="text-gray-600 text-sm text-center py-4">No measurements logged yet</div>';
    } else {
        history.forEach(entry => {
            html += `<div class="bg-gray-800 rounded-lg p-3 mb-2 border border-gray-700">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-bold text-amber-400">${formatDate(entry.measured_date)}</span>
                    <button onclick="deleteMeasurement('${entry.id}')" class="text-gray-600 hover:text-red-400 text-sm">&times;</button>
                </div>
                <div class="grid grid-cols-4 gap-1 text-center text-xs">`;
            MEASURE_FIELDS.forEach(f => {
                const val = entry[f.key];
                if (val) html += `<div><span class="text-gray-500">${f.label}</span><br><span class="text-gray-200 font-bold">${val}"</span></div>`;
            });
            html += `</div>`;
            if (entry.notes) html += `<div class="text-xs text-gray-500 mt-2">${escapeHtml(entry.notes)}</div>`;
            html += `</div>`;
        });
    }
    html += '</div>';

    document.getElementById('measurements-content').innerHTML = html;
}

async function saveMeasurement() {
    const dateVal = document.getElementById('meas-date').value;
    if (!dateVal) { alert('Please select a date'); return; }

    const payload = {
        user_id: currentSession.user.id,
        measured_date: dateVal,
        notes: document.getElementById('meas-notes').value || null
    };

    let hasData = false;
    MEASURE_FIELDS.forEach(f => {
        const val = document.getElementById('meas-' + f.key).value;
        payload[f.key] = val ? parseFloat(val) : null;
        if (val) hasData = true;
    });

    if (!hasData) { alert('Enter at least one measurement'); return; }

    try {
        const { error } = await sb.from('measurements').upsert(payload, { onConflict: 'user_id,measured_date' });
        if (error) throw error;
        // Clear form
        MEASURE_FIELDS.forEach(f => { document.getElementById('meas-' + f.key).value = ''; });
        document.getElementById('meas-notes').value = '';
        loadMeasurements();
    } catch (e) { alert('Save error: ' + e.message); }
}

async function deleteMeasurement(id) {
    if (!confirm('Delete this measurement?')) return;
    try {
        const { error } = await sb.from('measurements').delete().eq('id', id);
        if (error) throw error;
        loadMeasurements();
    } catch (e) { alert('Error: ' + e.message); }
}

async function showLeaderboardModal() {
    if (!currentProfile) return;
    showModal('<div class="flex items-center justify-center py-12"><div class="spinner"></div></div>');
    try {
        const profiles = await fetchAllProfiles();
        // Get this week's date range (Mon-Sun)
        const today = new Date(todayStr() + 'T12:00:00');
        const dow = today.getDay();
        const mondayOffset = dow === 0 ? -6 : 1 - dow;
        const monday = shiftDate(todayStr(), mondayOffset);
        const sunday = shiftDate(monday, 6);

        let html = `<div class="text-center mb-5"><div class="text-4xl mb-2">&#x1F3C6;</div>
            <h3 class="text-xl font-bold text-gradient">Household Leaderboard</h3>
            <p class="text-gray-500 text-sm">Week of ${formatDate(monday)} &mdash; ${formatDate(sunday)}</p></div>`;

        const leaderData = [];
        for (const user of profiles) {
            const { data: logs } = await sb.from('daily_logs').select('log_date, shots, protein, workout')
                .eq('user_id', user.id).gte('log_date', monday).lte('log_date', sunday);
            const sched = getSchedule(user);

            let shotsDue = 0, shotsDone = 0, workoutsDue = 0, workoutsDone = 0, proteinDays = 0, proteinHit = 0;

            for (let i = 0; i <= Math.min(6, daysSince(monday)); i++) {
                const date = shiftDate(monday, i);
                if (date > todayStr()) break;
                const d = new Date(date + 'T12:00:00').getDay();
                const daySched = sched[d];
                const log = (logs || []).find(l => l.log_date === date);

                // Shots
                const scheduledShots = daySched?.shots || [];
                shotsDue += scheduledShots.length;
                if (log && log.shots) {
                    scheduledShots.forEach(s => { if (log.shots[s]) shotsDone++; });
                }

                // Workouts
                const type = daySched?.type;
                if (type && type !== 'rest' && type !== 'recovery') {
                    workoutsDue++;
                    if (log && log.workout && log.workout.completed) workoutsDone++;
                }

                // Protein
                proteinDays++;
                if (log && log.protein && parseFloat(log.protein) >= (user.protein_min || 0)) proteinHit++;
            }

            const shotPct = shotsDue > 0 ? Math.round((shotsDone / shotsDue) * 100) : 100;
            const workPct = workoutsDue > 0 ? Math.round((workoutsDone / workoutsDue) * 100) : 100;
            const protPct = proteinDays > 0 ? Math.round((proteinHit / proteinDays) * 100) : 0;
            const overall = Math.round((shotPct + workPct + protPct) / 3);

            leaderData.push({ name: user.display_name, shotPct, workPct, protPct, overall });
        }

        // Sort by overall score descending
        leaderData.sort((a, b) => b.overall - a.overall);
        const medals = ['&#x1F947;', '&#x1F948;', '&#x1F949;'];

        leaderData.forEach((u, i) => {
            const medal = medals[i] || '';
            const barColor = u.overall >= 80 ? 'from-emerald-500 to-emerald-400' : u.overall >= 50 ? 'from-amber-500 to-amber-400' : 'from-red-500 to-red-400';
            html += `<div class="bg-gray-800 rounded-xl p-4 mb-3 border border-gray-700/50">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <span class="text-xl">${medal}</span>
                        <span class="font-bold text-gray-100">${u.name}</span>
                    </div>
                    <span class="text-xl font-extrabold text-gradient">${u.overall}%</span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-2 mb-3"><div class="bg-gradient-to-r ${barColor} h-2 rounded-full" style="width:${u.overall}%"></div></div>
                <div class="grid grid-cols-3 gap-2 text-center text-xs">
                    <div><div class="text-gray-500">Shots</div><div class="font-bold ${u.shotPct>=80?'text-emerald-400':u.shotPct>=50?'text-amber-400':'text-red-400'}">${u.shotPct}%</div></div>
                    <div><div class="text-gray-500">Workouts</div><div class="font-bold ${u.workPct>=80?'text-emerald-400':u.workPct>=50?'text-amber-400':'text-red-400'}">${u.workPct}%</div></div>
                    <div><div class="text-gray-500">Protein</div><div class="font-bold ${u.protPct>=80?'text-emerald-400':u.protPct>=50?'text-amber-400':'text-red-400'}">${u.protPct}%</div></div>
                </div>
            </div>`;
        });

        html += '<button onclick="closeModal()" class="btn-secondary mt-4">Close</button>';
        showModal(html);
    } catch (e) {
        showModal(`<div class="text-red-400 text-center py-6">${e.message}</div><button onclick="closeModal()" class="btn-secondary mt-4">Close</button>`);
    }
}

async function showSummaryModal() {

    try {
        const logs = await fetchSummaryLogs();
        const schedule = getSchedule(currentProfile);
        const logMap = {};
        logs.forEach(l => { logMap[l.log_date] = l; });

        const start = currentProfile.program_start || '2026-03-25';
        const totalDays = Math.floor((new Date(todayStr()+'T12:00:00') - new Date(start+'T12:00:00')) / 86400000) + 1;

        let html = `<div class="text-center mb-4">
            <div class="text-4xl mb-2">&#x1F4CA;</div>
            <h3 class="text-xl font-bold text-gradient">Activity Summary</h3>

        <div class="flex items-center gap-3 py-1.5 px-2 border-b border-gray-700 mb-1">

            <div class="flex-1 min-w-0 text-xs font-bold text-gray-500">Shots</div>
            <div class="w-14 text-center text-xs font-bold text-gray-500">Workout</div>
        </div><div class="space-y-1">`;

        for (let i = 0; i < totalDays; i++) {
            const dateStr = shiftDate(todayStr(), -i);
            const log = logMap[dateStr];
            const dow = new Date(dateStr + 'T12:00:00').getDay();
            const isToday = (i === 0);

            const shots = log?.shots || {};
            const shotNames = Object.keys(shots);
            const expected = schedule[dow]?.shots || [];
            let shotsHtml;
            if (shotNames.length > 0) {
                shotsHtml = shotNames.map(n => `<span class="text-emerald-400">${n}</span>`).join(', ');
            } else if (expected.length === 0) {
                shotsHtml = '<span class="text-gray-600">no shots</span>';

            html += `<div class="flex items-center gap-3 py-1.5 px-2 rounded-lg ${isToday ? 'bg-amber-900/20 border border-amber-800/40' : ''}">
                <div class="w-16 shrink-0 text-xs font-bold ${isToday ? 'text-amber-400' : 'text-gray-400'}">${DAYS_SHORT[dow]} ${formatDateShort(dateStr)}</div>
                <div class="flex-1 min-w-0 text-xs truncate">${shotsHtml}</div>
                <div class="w-14 text-center text-sm">${workoutIcon}</div>
            </div>`;
        }

        html += `</div></div><button onclick="closeModal()" class="btn-secondary mt-6">Close</button>`;

        showModal(`<div class="text-red-400 text-center py-8">${e.message}</div>
            <button onclick="closeModal()" class="btn-secondary mt-4">Close</button>`);
    }
}

    // Log history
    if (recentLogs.length > 0) {
        html += `<div class="card"><div class="section-title">Recent Log History</div><div class="space-y-1 text-sm">`;
        recentLogs.forEach(l => {
            html += `<div class="flex justify-between items-center py-1 border-b border-gray-800">
                <span class="text-gray-400">${formatDate(l.log_date)}</span>
                <span class="text-gray-500 text-xs">${l.weight?l.weight+'lb ':''} ${l.calories?l.calories+'cal ':''} ${l.protein?l.protein+'g ':''} ${l.workout?.completed?'&#x2705;':''}</span>
            </div>`;
        });
        html += '</div></div>';
    }

    // Logout
    html += `<button onclick="handleLogout()" class="btn-danger mt-4">Sign Out</button>`;

    document.getElementById('settings-content').innerHTML = html;
}

async function exportMyData() {
    try {
        const uid = currentSession.user.id;
        const [logsR, measR, pensR] = await Promise.all([
            sb.from('daily_logs').select('*').eq('user_id', uid).order('log_date'),
            sb.from('measurements').select('*').eq('user_id', uid).order('measured_date'),
            sb.from('pens').select('*').or(`assigned_to.eq.${uid},shared.eq.true`).order('filled_date')
        ]);
        const payload = {
            schema: 'pepcc-backup',
            version: 1,
            exported_at: new Date().toISOString(),
            user: { id: uid, display_name: currentProfile.display_name, email: currentSession.user.email },
            profile: currentProfile,
            daily_logs: logsR.data || [],
            measurements: measR.data || [],
            pens_snapshot: pensR.data || []
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `pepcc-backup-${currentProfile.display_name}-${todayStr()}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    } catch(e) { alert(e.message); }
}

async function handleRestoreFile(input) {
    const file = input.files && input.files[0];
    input.value = ''; // allow re-selecting the same file later
    if (!file) return;
    try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (data.schema !== 'pepcc-backup') throw new Error('Not a Peptide Command Center backup file.');
        if (data.user && data.user.id && data.user.id !== currentSession.user.id) {
            if (!confirm(`Backup belongs to ${data.user.display_name || 'another user'}. Restoring will write to YOUR account. Continue?`)) return;
        }
        const logs = Array.isArray(data.daily_logs) ? data.daily_logs : [];
        const meas = Array.isArray(data.measurements) ? data.measurements : [];
        const exportedAt = data.exported_at ? new Date(data.exported_at).toLocaleString() : 'unknown';
        const html = `
            <div class="text-center mb-4">
                <div class="text-3xl mb-2">&#x1F4E5;</div>
                <h3 class="text-lg font-bold text-amber-400">Restore from Backup</h3>
                <p class="text-xs text-gray-500">Exported: ${exportedAt}</p>
            </div>
            <div class="space-y-2 mb-4 text-sm">
                <div class="flex justify-between"><span class="text-gray-400">Daily logs</span><span class="text-white font-bold">${logs.length}</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Measurements</span><span class="text-white font-bold">${meas.length}</span></div>
                <label class="flex items-center gap-2 mt-3 cursor-pointer">
                    <input type="checkbox" id="restore-profile-too" class="w-4 h-4">
                    <span class="text-xs text-gray-300">Also restore profile fields (macro targets, no-go foods, schedule overrides). Will overwrite current settings.</span>
                </label>
            </div>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="btn-shot bg-gray-800 border border-gray-700 text-gray-300" style="box-shadow:none">Cancel</button>
                <button onclick="runRestore()" class="btn-primary">Restore</button>
            </div>`;
        window._pendingRestore = data;
        showModal(html);
    } catch (e) {
        alert('Restore error: ' + e.message);
    }
}

async function runRestore() {
    const data = window._pendingRestore;
    if (!data) { closeModal(); return; }
    const restoreProfile = !!document.getElementById('restore-profile-too')?.checked;
    closeModal();
    try {
        const uid = currentSession.user.id;
        let logsCount = 0, measCount = 0;
        if (Array.isArray(data.daily_logs) && data.daily_logs.length > 0) {
            const rows = data.daily_logs.map(l => ({ ...l, user_id: uid }));
            // Strip created_at/updated_at so DB defaults take effect on new rows.
            rows.forEach(r => { delete r.id; });
            const { error } = await sb.from('daily_logs').upsert(rows, { onConflict: 'user_id,log_date' });
            if (error) throw error;
            logsCount = rows.length;
        }
        if (Array.isArray(data.measurements) && data.measurements.length > 0) {
            const rows = data.measurements.map(m => ({ ...m, user_id: uid }));
            rows.forEach(r => { delete r.id; });
            const { error } = await sb.from('measurements').upsert(rows, { onConflict: 'user_id,measured_date' });
            if (error) throw error;
            measCount = rows.length;
        }
        if (restoreProfile && data.profile) {
            const safe = { ...data.profile };
            delete safe.id; delete safe.created_at; delete safe.is_admin;
            await updateProfileField(uid, safe);
        }
        window._pendingRestore = null;
        alert(`Restored ${logsCount} log${logsCount === 1 ? '' : 's'}` + (measCount ? ` and ${measCount} measurement${measCount === 1 ? '' : 's'}` : '') + (restoreProfile ? '. Profile updated.' : '.'));
        await loadSettings();
    } catch (e) {
        alert('Restore failed: ' + e.message);
    }
}

// ╔══════════════════════════════════════════════════════════════╗
// ║              15b. BARCODE FOOD SCANNER                      ║
// ╚══════════════════════════════════════════════════════════════╝
//
// Uses @zxing/library (loaded from CDN as a UMD global `ZXing`) to read the
// camera stream, then looks up the scanned EAN/UPC code in the public
// Open Food Facts database. The user confirms how many servings they ate
// and the macros are accumulated onto today's log.

let barcodeReader = null;
let barcodeControls = null;
let lastScannedProduct = null;

async function openBarcodeScanner() {
    if (typeof ZXing === 'undefined') {
        alert('Barcode scanner library failed to load. Check your connection and try again.');
        return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert('This browser does not support camera access. Use manual entry instead.');
        return;
    }
    const html = `
        <div class="text-center mb-3">
            <div class="text-2xl mb-1">&#x1F4F7;</div>
            <h3 class="text-lg font-bold text-amber-400">Scan Food Barcode</h3>
            <p class="text-xs text-gray-500">Point the camera at the product's barcode.</p>
        </div>
        <div class="relative bg-black rounded-lg overflow-hidden" style="aspect-ratio:4/3">
            <video id="scanner-video" class="w-full h-full object-cover" autoplay muted playsinline></video>
            <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                <div class="border-2 border-amber-400 rounded-lg" style="width:80%; height:35%"></div>
            </div>
        </div>
        <div id="scanner-status" class="text-center text-xs text-gray-400 mt-3">Looking for a barcode...</div>
        <div class="flex gap-2 mt-4">
            <button onclick="closeBarcodeScanner()" class="btn-shot bg-gray-800 border border-gray-700 text-gray-300" style="box-shadow:none">Cancel</button>
        </div>`;
    showModal(html);

    try {
        const hints = new Map();
        const formats = [
            ZXing.BarcodeFormat.EAN_13,
            ZXing.BarcodeFormat.EAN_8,
            ZXing.BarcodeFormat.UPC_A,
            ZXing.BarcodeFormat.UPC_E,
            ZXing.BarcodeFormat.CODE_128,
            ZXing.BarcodeFormat.CODE_39,
            ZXing.BarcodeFormat.QR_CODE
        ];
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
        barcodeReader = new ZXing.BrowserMultiFormatReader(hints);
        const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();
        // Prefer the rear-facing camera on a phone.
        const rear = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[devices.length - 1];
        const deviceId = rear ? rear.deviceId : undefined;
        barcodeControls = await barcodeReader.decodeFromVideoDevice(deviceId, 'scanner-video', (result, err, controls) => {
            if (result) {
                controls.stop();
                onBarcodeDetected(result.getText());
            }
        });
    } catch (e) {
        document.getElementById('scanner-status').innerHTML = '<span class="text-red-400">Camera error: ' + e.message + '</span>';
    }
}

function closeBarcodeScanner() {
    try { if (barcodeControls) barcodeControls.stop(); } catch (e) { /* ignore */ }
    try { if (barcodeReader) barcodeReader.reset(); } catch (e) { /* ignore */ }
    barcodeControls = null;
    barcodeReader = null;
    closeModal();
}

async function onBarcodeDetected(code) {
    const statusEl = document.getElementById('scanner-status');
    if (statusEl) statusEl.innerHTML = `Looking up <span class="text-amber-400 font-mono">${code}</span>...`;
    try {
        const resp = await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json`);
        const data = await resp.json();
        if (!data || data.status !== 1 || !data.product) {
            showFoodNotFound(code);
            return;
        }
        showFoodConfirm(code, data.product);
    } catch (e) {
        if (statusEl) statusEl.innerHTML = '<span class="text-red-400">Lookup failed: ' + e.message + '</span>';
    }
}

function showFoodNotFound(code) {
    closeBarcodeScanner();
    const html = `
        <div class="text-center mb-4">
            <div class="text-3xl mb-2">&#x1F50D;</div>
            <h3 class="text-lg font-bold text-amber-400">Product Not Found</h3>
            <p class="text-xs text-gray-500 font-mono">${code}</p>
            <p class="text-sm text-gray-400 mt-2">This barcode isn't in Open Food Facts yet. You can add macros manually below.</p>
        </div>
        <div class="space-y-3">
            <div><label class="label">Calories (this meal)</label><input type="number" inputmode="numeric" class="input-field" id="manual-cal" placeholder="e.g. 300"></div>
            <div><label class="label">Protein (g, this meal)</label><input type="number" inputmode="numeric" class="input-field" id="manual-pro" placeholder="e.g. 20"></div>
            <div><label class="label">Fiber (g, this meal, optional)</label><input type="number" inputmode="numeric" class="input-field" id="manual-fib" placeholder="0"></div>
        </div>
        <div class="flex gap-2 mt-5">
            <button onclick="closeModal()" class="btn-shot bg-gray-800 border border-gray-700 text-gray-300" style="box-shadow:none">Cancel</button>
            <button onclick="addManualFood()" class="btn-primary">Add to today</button>
        </div>`;
    showModal(html);
}

async function addManualFood() {
    const cal = parseFloat(document.getElementById('manual-cal')?.value) || 0;
    const pro = parseFloat(document.getElementById('manual-pro')?.value) || 0;
    const fib = parseFloat(document.getElementById('manual-fib')?.value) || 0;
    if (cal === 0 && pro === 0 && fib === 0) { alert('Enter at least one value.'); return; }
    await accumulateMacros({ calories: cal, protein: pro, fiber: fib });
    closeModal();
    await loadDashboard();
}

function showFoodConfirm(code, product) {
    closeBarcodeScanner();
    lastScannedProduct = product;
    const name = product.product_name || product.product_name_en || 'Unknown product';
    const brand = product.brands || '';
    const n = product.nutriments || {};
    // Open Food Facts typically reports per-100g; serving values are best-effort.
    const calPer100 = n['energy-kcal_100g'] != null ? n['energy-kcal_100g'] : (n['energy-kcal'] || null);
    const proPer100 = n.proteins_100g != null ? n.proteins_100g : (n.proteins || null);
    const fibPer100 = n.fiber_100g != null ? n.fiber_100g : (n.fiber || null);
    const calServ = n['energy-kcal_serving'];
    const proServ = n.proteins_serving;
    const fibServ = n.fiber_serving;
    const servingSize = product.serving_size || (product.serving_quantity ? product.serving_quantity + ' g' : '');

    const calBase = calServ != null ? calServ : calPer100;
    const proBase = proServ != null ? proServ : proPer100;
    const fibBase = fibServ != null ? fibServ : fibPer100;
    const baseLabel = calServ != null ? `per serving${servingSize ? ' (' + servingSize + ')' : ''}` : 'per 100 g';

    const html = `
        <div class="mb-3">
            <div class="text-xs text-gray-500 font-mono">${code}</div>
            <h3 class="text-base font-bold text-amber-400 mt-1">${name}</h3>
            ${brand ? `<div class="text-xs text-gray-400">${brand}</div>` : ''}
            <div class="text-[10px] text-gray-500 uppercase tracking-wide mt-2">${baseLabel}</div>
            <div class="grid grid-cols-3 gap-1.5 mt-1">
                <div class="bg-gray-800 rounded-lg p-2 text-center"><div class="text-white font-bold text-sm">${calBase != null ? Math.round(calBase) : '—'}</div><div class="text-[10px] text-gray-500">cal</div></div>
                <div class="bg-gray-800 rounded-lg p-2 text-center"><div class="text-white font-bold text-sm">${proBase != null ? proBase.toFixed(1) : '—'}</div><div class="text-[10px] text-gray-500">g pro</div></div>
                <div class="bg-gray-800 rounded-lg p-2 text-center"><div class="text-white font-bold text-sm">${fibBase != null ? fibBase.toFixed(1) : '—'}</div><div class="text-[10px] text-gray-500">g fiber</div></div>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
                <label class="label">Servings eaten</label>
                <input type="number" inputmode="decimal" step="0.25" class="input-field" id="food-qty" value="1" oninput="updateFoodPreview(${calBase},${proBase},${fibBase})">
            </div>
            <div>
                <label class="label">Adding</label>
                <div id="food-preview" class="input-field bg-gray-950 text-amber-400 font-bold text-center text-sm">&mdash;</div>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="openBarcodeScanner()" class="btn-shot bg-gray-800 border border-gray-700 text-gray-300" style="box-shadow:none">Scan another</button>
            <button onclick="confirmAddFood(${calBase},${proBase},${fibBase})" class="btn-primary">Add to today</button>
        </div>`;
    showModal(html);
    updateFoodPreview(calBase, proBase, fibBase);
}

function updateFoodPreview(cal, pro, fib) {
    const qty = parseFloat(document.getElementById('food-qty')?.value) || 1;
    const el = document.getElementById('food-preview');
    if (!el) return;
    const parts = [];
    if (cal != null) parts.push(Math.round(cal * qty) + ' cal');
    if (pro != null) parts.push((pro * qty).toFixed(1) + 'g pro');
    if (fib != null && fib > 0) parts.push((fib * qty).toFixed(1) + 'g fib');
    el.textContent = parts.length ? parts.join(' • ') : '—';
}

async function confirmAddFood(cal, pro, fib) {
    const qty = parseFloat(document.getElementById('food-qty')?.value) || 1;
    await accumulateMacros({
        calories: (cal != null) ? cal * qty : 0,
        protein: (pro != null) ? pro * qty : 0,
        fiber: (fib != null) ? fib * qty : 0
    });
    closeModal();
    await loadDashboard();
}

async function accumulateMacros(add) {
    try {
        await ensureTodayLog();
        const curCal = parseFloat(todayLog.calories) || 0;
        const curPro = parseFloat(todayLog.protein) || 0;
        const curFib = parseFloat(todayLog.fiber) || 0;
        const newCal = curCal + (add.calories || 0);
        const newPro = curPro + (add.protein || 0);
        const newFib = curFib + (add.fiber || 0);
        todayLog.calories = Math.round(newCal);
        todayLog.protein = Math.round(newPro * 10) / 10;
        if (add.fiber > 0 || curFib > 0) todayLog.fiber = Math.round(newFib * 10) / 10;
        await upsertTodayLog();
    } catch (e) { alert('Save error: ' + e.message); }
}

// ╔══════════════════════════════════════════════════════════════╗
// ║                 16. REAL-TIME SUBSCRIPTIONS                 ║
// ╚══════════════════════════════════════════════════════════════╝

function setupRealtime() {
    if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel = null; }
    realtimeChannel = sb.channel('lab-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'master_vials' }, () => {
            const onDash = !document.getElementById('screen-dashboard').classList.contains('hidden');
            const onLab = !document.getElementById('screen-lab').classList.contains('hidden');
            if (onDash) loadDashboard();
            if (onLab) loadLab(true);
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'pens' }, () => {
            const onDash = !document.getElementById('screen-dashboard').classList.contains('hidden');
            const onLab = !document.getElementById('screen-lab').classList.contains('hidden');
            if (onDash) loadDashboard();
            if (onLab) loadLab(true);
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'inventory' }, () => {
            if (!document.getElementById('screen-lab').classList.contains('hidden')) loadLab(true);
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'peptide_types' }, () => {
            if (!document.getElementById('screen-lab').classList.contains('hidden')) loadLab(true);
        })
        .subscribe();
}

// ║                 17. INIT                                    ║
// ╚══════════════════════════════════════════════════════════════╝

async function init() {
    // Check for existing session
    const { data: { session } } = await sb.auth.getSession();

    // Listen for auth changes
    sb.auth.onAuthStateChange(async (event, session) => {
        currentSession = session;
        if (session) {
            try {
                currentProfile = await fetchProfile();
                todayLog = null; // reset cache
                setupRealtime();
                showScreen('dashboard');
            } catch (e) {
                console.error('Profile load failed:', e);
                alert('Failed to load profile: ' + e.message);
                showScreen('auth');
            }
        } else {
            currentProfile = null;
            todayLog = null;
            showScreen('auth');
        }
    });

    // Show appropriate screen
    if (session) {
        currentSession = session;
        try {
            currentProfile = await fetchProfile();
            setupRealtime();
            showScreen('dashboard');
        } catch (e) {
            showScreen('auth');
        }
    } else {
        showScreen('auth');
    }
}

document.addEventListener('DOMContentLoaded', init);

// PWA: register the service worker after the app has had a moment to settle.
// Failures are non-fatal — the app still works without it.
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW registration failed:', e));
    });
}
</script>
