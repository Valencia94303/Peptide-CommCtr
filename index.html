function todayStr() { return new Date().toISOString().split('T')[0]; }
function dayOfWeek() { return new Date().getDay(); }
function formatDate(str) { return new Date(str+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function formatDateLong(str) { return new Date(str+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
function formatDateShort(str) { const d=new Date(str+'T12:00:00'); return (d.getMonth()+1)+'/'+d.getDate(); }
function daysSince(dateStr) { const t=new Date(dateStr+'T12:00:00'),n=new Date();n.setHours(12,0,0,0); return Math.floor((n-t)/86400000); }
function calcUnits(doseMg,vialMg,waterMl) { if(!vialMg||!waterMl||!doseMg)return 0; return((doseMg/vialMg)*waterMl*100).toFixed(1); }
function calcUnitsFromConc(doseMg, concMgPerMl) { if(!doseMg||!concMgPerMl)return 0; return((doseMg/concMgPerMl)*100).toFixed(1); }

function weekNum(profile) {
    if (!profile || !profile.program_start) return 1;
    return Math.max(1, Math.floor(daysSince(profile.program_start) / 7) + 1);

async function fetchProfile() {
    const { data, error } = await sb.from('profiles').select('*').eq('id', currentSession.user.id).maybeSingle();
    if (error) throw error;
    if (!data) {
        const dn = currentSession.user.user_metadata?.display_name || 'User';
        const defaults = getProfileDefaults(dn);
        const { data: created, error: e2 } = await sb.from('profiles').insert({ id: currentSession.user.id, display_name: dn, ...defaults }).select().single();
        if (e2) throw e2;
        return created;
    }
    return data;
}

    return data || [];

    const { error } = await sb.from('profiles').update(updates).eq('id', profileId);

    if (profileId === currentSession.user.id) currentProfile = { ...currentProfile, ...updates };
}

async function ensureTodayLog() {
    if (todayLog && todayLog.log_date === todayStr()) return todayLog;
    const { data, error } = await sb.from('daily_logs').select('*')
        .eq('user_id', currentSession.user.id).eq('log_date', todayStr()).maybeSingle();
    if (error) throw error;
    todayLog = data || { user_id: currentSession.user.id, log_date: todayStr(), calories: null, protein: null, weight: null, water: null, fiber: null, shots: {}, workout: { completed: false, notes: '' } };
    return todayLog;
}

async function upsertTodayLog() {
    const log = todayLog;
    const payload = {
        user_id: log.user_id, log_date: log.log_date,
        calories: log.calories, protein: log.protein, weight: log.weight,
        water: log.water, fiber: log.fiber, shots: log.shots, workout: log.workout,
        updated_at: new Date().toISOString()
    };
    const { data, error } = await sb.from('daily_logs').upsert(payload, { onConflict: 'user_id,log_date' }).select().single();
    if (error) throw error;
    todayLog = data;
}

async function fetchWeightHistory() {
    const { data, error } = await sb.from('daily_logs').select('log_date, weight')

}

async function computeWeeklyLossRate() {
    const { data, error } = await sb.from('daily_logs').select('log_date, weight')
        .eq('user_id', currentSession.user.id).not('weight', 'is', null).gt('weight', 0)
        .order('log_date', { ascending: false }).limit(7);
    if (error || !data || data.length < 2) return null;
    const sorted = [...data].sort((a, b) => a.log_date.localeCompare(b.log_date));
    const first = parseFloat(sorted[0].weight), last = parseFloat(sorted[sorted.length - 1].weight);
    const d = Math.abs((new Date(sorted[sorted.length-1].log_date+'T12:00:00') - new Date(sorted[0].log_date+'T12:00:00')) / 86400000);
    if (d < 3) return null;
    return ((first - last) / d) * 7;
}

async function fetchLatestWeight() {
    const { data, error } = await sb.from('daily_logs').select('weight')
        .eq('user_id', currentSession.user.id).not('weight', 'is', null).gt('weight', 0)

    if (error) return null;
    return data ? parseFloat(data.weight) : null;
}

async function fetchMyActivePens() {
    const { data, error } = await sb.from('pens').select('*')
        .eq('depleted', false).eq('assigned_to', currentSession.user.id)
        .order('filled_date', { ascending: false });
    if (error) throw error;
    return data || [];
}

async function insertPen(masterVialId, peptide, mlFromMaster, mlFreshWater, totalMl, mgContent, concentration, filledDate, assignedTo) {
    const { error } = await sb.from('pens').insert({
        master_vial_id: masterVialId, peptide,
        ml_from_master: mlFromMaster, ml_fresh_water: mlFreshWater,
        total_ml: totalMl, mg_content: mgContent,
        concentration, filled_date: filledDate,
        assigned_to: assignedTo || null
    });
    if (error) throw error;
}

async function markPenDepleted(id) {
    const { error } = await sb.from('pens').update({ depleted: true }).eq('id', id);
    if (error) throw error;
}

async function fetchPeptideTypes() {
    const { data, error } = await sb.from('peptide_types').select('*').order('name');
    if (error) throw error;
    cachedPeptideTypes = data || [];
    return cachedPeptideTypes;
}

async function insertPeptideType(name, vialSize) {
    const { error } = await sb.from('peptide_types').insert({ name, vial_size: vialSize });
    if (error) throw error;
}

async function deletePeptideType(id) {
    const { error } = await sb.from('peptide_types').delete().eq('id', id);
    if (error) throw error;
}

async function fetchInventory() {
    const { data, error } = await sb.from('inventory').select('*').order('item_name');
    if (error) throw error;
    cachedInventory = data || [];
    return cachedInventory;
}

async function setInventoryCount(id, count) {
    const { error } = await sb.from('inventory').update({ count: Math.max(0, count) }).eq('id', id);
    if (error) throw error;
}

async function upsertInventoryItem(itemName, count) {
    const { error } = await sb.from('inventory').upsert({ item_name: itemName, count }, { onConflict: 'item_name' });
    if (error) throw error;
}

async function handleSignIn() {
    const email = document.getElementById('auth-email').value.trim();
    const pw = document.getElementById('auth-pw').value;
    if (!email || !pw) { alert('Enter email and password.'); return; }
    setBtnLoading('auth-btn', true);
    try {
        const { error } = await sb.auth.signInWithPassword({ email, password: pw });
        if (error) throw error;
    } catch (e) { alert(e.message); }
    setBtnLoading('auth-btn', false);
}

async function handleSignUp() {
    const email = document.getElementById('auth-email').value.trim();
    const pw = document.getElementById('auth-pw').value;
    const name = document.getElementById('auth-name').value.trim();
    if (!email || !pw || !name) { alert('Fill in all fields.'); return; }
    setBtnLoading('auth-btn', true);
    try {
        const { data, error } = await sb.auth.signUp({ email, password: pw, options: { data: { display_name: name } } });
        if (error) throw error;
        if (data.user) {
            const defaults = getProfileDefaults(name);
            await sb.from('profiles').insert({ id: data.user.id, display_name: name, ...defaults });
        }
    } catch (e) { alert(e.message); }
    setBtnLoading('auth-btn', false);
}

async function handleLogout() {
    await sb.auth.signOut();
    currentSession = null; currentProfile = null; todayLog = null;
    showScreen('auth');
}

function setBtnLoading(id, loading) {
    const btn = document.getElementById(id);
    if (!btn) return;
    if (loading) { btn.dataset.origText = btn.textContent; btn.disabled = true; btn.innerHTML = '<div class="spinner" style="width:1.2rem;height:1.2rem;border-width:2px;margin:0 auto"></div>'; }
    else { btn.disabled = false; btn.textContent = btn.dataset.origText || 'Submit'; }
}

function showScreen(name) {
    document.querySelectorAll('#app > div').forEach(el => el.classList.add('hidden'));
    const screen = document.getElementById('screen-' + name);
    if (screen) { screen.classList.remove('hidden'); screen.classList.add('fade-in'); }
    window.scrollTo(0, 0);

    if (name === 'auth') renderAuthForm();
    if (name === 'dashboard') loadDashboard();
    if (name === 'lab') loadLab();
    if (name === 'workout') renderWorkoutPlan();
    if (name === 'settings') loadSettings();
}

function showModal(html) {
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal-overlay').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}
function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    document.body.style.overflow = '';
}

async function loadDashboard() {
    if (!currentProfile) return;
    const p = currentProfile;

    document.getElementById('dash-avatar').textContent = (p.display_name || '?')[0].toUpperCase();
    document.getElementById('dash-username').textContent = p.display_name;
    document.getElementById('dash-date').textContent = formatDateLong(todayStr());
    const labBtn = document.getElementById('btn-lab');
    if (isAdmin(p)) labBtn.classList.remove('hidden'); else labBtn.classList.add('hidden');

    showLoading('dash-content');
    try {
        const [log, pens, masters, weightHist, rate, latestW] = await Promise.all([
            ensureTodayLog(), fetchMyActivePens(), fetchActiveMasters(), fetchWeightHistory(), computeWeeklyLossRate(), fetchLatestWeight()
        ]);
        renderDashboard(p, log, pens, masters, weightHist, rate, latestW);
    } catch (e) {
        document.getElementById('dash-content').innerHTML = `<div class="text-center py-12 text-red-400">${e.message}</div>`;
    }
}

function renderDashboard(p, log, pens, masters, weightHist, rate, latestW) {
    const schedule = getSchedule(p);
    const todaySched = schedule[dayOfWeek()];
    const wk = weekNum(p);
    let html = '';

    // === WARNINGS ===
    if (latestW !== null && latestW < 150 && rate !== null && rate > 2) {
        html += `<div class="bg-red-900/60 border-2 border-red-600 rounded-xl p-4 expiry-pulse">
            <div class="font-bold text-red-400 text-lg">&#x26A0; Gaunt Check Warning</div>
            <div class="text-red-300 text-sm mt-1">Losing ${rate.toFixed(1)} lbs/week at ${latestW} lbs. Increase calories by 150 kcal to protect muscle and collagen.</div>
        </div>`;
    }
    if (rate !== null && rate > p.warning_threshold) {
        html += `<div class="bg-yellow-900/50 border border-yellow-600 rounded-xl p-4">
            <div class="font-bold text-yellow-400">&#x26A0; Losing Too Fast</div>
            <div class="text-yellow-300 text-sm mt-1">Rate: ${rate.toFixed(1)} lbs/week (threshold: ${p.warning_threshold}). Increase calories.</div>
        </div>`;
    }
    if (isAdmin(p)) {
        masters.forEach(v => {
            if (daysSince(v.mixed_date) > 28) {
                html += `<div class="bg-red-900/60 border border-red-700 rounded-xl p-3">
                    <div class="font-bold text-red-400 text-sm">&#x26A0; ${v.peptide} Master (${v.total_mg}mg) EXPIRED &mdash; ${daysSince(v.mixed_date)} days old</div>
                </div>`;
            }
        });
        pens.forEach(pen => {
            if (daysSince(pen.filled_date) > 28) {
                html += `<div class="bg-red-900/60 border border-red-700 rounded-xl p-3">
                    <div class="font-bold text-red-400 text-sm">&#x26A0; ${pen.peptide} Pen EXPIRED &mdash; ${daysSince(pen.filled_date)} days old</div>
                </div>`;
            }
        });
    }

    // === TODAY'S PROTOCOL ===
    const windowLabel = todaySched.window === 'morning' ? '&#x1F305; Morning Fasted' : '&#x1F319; Evening Bedtime';
    const windowColor = todaySched.window === 'morning' ? 'text-blue-400' : 'text-purple-400';
    html += `<div class="card">
        <div class="section-title">Today's Protocol &mdash; ${DAYS[dayOfWeek()]}</div>
        <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 rounded-full flex items-center justify-center text-lg ${todaySched.type==='rest'?'bg-gray-800':todaySched.type==='training'||todaySched.type==='treadmill'?'bg-blue-900/60':todaySched.type==='walk'?'bg-green-900/60':'bg-purple-900/60'}">
                ${todaySched.type==='rest'||todaySched.type==='recovery'?'&#x1F9D8;':todaySched.type==='training'||todaySched.type==='treadmill'?'&#x1F4AA;':todaySched.type==='walk'?'&#x1F6B6;':'&#x2728;'}
            </div>
            <div>
                <div class="font-bold text-white">${todaySched.workout}</div>
                <div class="text-sm ${windowColor}">${windowLabel}</div>
            </div>
        </div>
        <div class="text-xs text-gray-500 mb-3">${todaySched.fasting}</div>`;

    // Render each peptide shot independently
    const todayShots = todaySched.shots || [];
    if (todayShots.length > 0) {
        todayShots.forEach(peptide => {
            const shotLog = log.shots || {};
            const logged = !!shotLog[peptide] && (Date.now() - new Date(shotLog[peptide]).getTime()) < 86400000;

            // Shot button
            html += `<button onclick="logShot('${peptide}')"
                class="w-full py-3 rounded-xl font-bold transition-all active:scale-[0.97] flex items-center justify-center gap-2 mb-2 ${logged?'bg-emerald-700 text-white':'bg-amber-600 hover:bg-amber-500 text-white'}">
                ${logged ? '&#x2705; '+peptide+' Logged' : '&#x1F489; Log '+peptide}
            </button>`;

            // Dosing info from user's pen
            const pen = pens.find(pe => pe.peptide === peptide);
            const dose = p.current_doses ? p.current_doses[peptide] : null;
            if (pen && dose) {
                const units = calcUnitsFromConc(dose, pen.concentration);
                const age = daysSince(pen.filled_date), expiring = age >= 25, expired = age > 28;
                html += `<div class="bg-gray-800 rounded-lg p-2 mb-2 ${expired?'border-2 border-red-600 expiry-pulse':expiring?'border border-yellow-600':''}">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 text-xs">${peptide}: ${dose}mg @ ${pen.concentration} mg/mL</span>
                        <span class="text-lg font-bold text-amber-400">${units}u</span>
                    </div>
                    ${expired?'<div class="text-red-400 text-xs font-bold">EXPIRED ('+age+'d) \u2014 REFILL</div>':expiring?'<div class="text-yellow-400 text-xs">Expires in '+(28-age)+'d</div>':''}
                </div>`;
            } else if (dose) {
                html += `<div class="bg-gray-800 rounded-lg p-2 mb-2 text-gray-600 text-xs text-center">No pen for ${peptide} \u2014 see Admin Lab</div>`;
            }
        });
    } else {
        html += '<div class="text-gray-500 text-sm text-center py-2">No shots today \u2014 recovery focus</div>';
    }

    // Protein First reminder for Karen on workout days
    if (profileIs(p,'karen') && todaySched.window === 'morning') {
        html += '<div class="bg-blue-900/30 border border-blue-800 rounded-lg p-2 mt-1 text-xs text-blue-300">&#x1F4AA; Protein First: Hit your 90-100g floor to protect muscle tone at 5% incline.</div>';
    }
    html += '</div>';

    // === MACRO TRACKER ===
    html += `<div class="card"><div class="section-title">Daily Tracking</div><div class="grid grid-cols-2 gap-3">
        <div><label class="label">Calories <span class="text-amber-500">(${p.calorie_target})</span></label>
            <input type="number" inputmode="numeric" class="input-field" value="${log.calories||''}" placeholder="${p.calorie_target}" onchange="saveDailyField('calories',this.value)"></div>
        <div><label class="label">Protein (g) <span class="text-amber-500">(${p.protein_min}-${p.protein_max})</span></label>
            <input type="number" inputmode="numeric" class="input-field" value="${log.protein||''}" placeholder="${p.protein_min}" onchange="saveDailyField('protein',this.value)"></div>
        <div><label class="label">Water (oz) <span class="text-amber-500">(${p.water_target})</span></label>
            <input type="number" inputmode="numeric" class="input-field" value="${log.water||''}" placeholder="${p.water_target}" onchange="saveDailyField('water',this.value)"></div>
        ${p.fiber_target ? `<div><label class="label">Fiber (g) <span class="text-amber-500">(${p.fiber_target}+)</span></label>
            <input type="number" inputmode="numeric" class="input-field" value="${log.fiber||''}" placeholder="${p.fiber_target}" onchange="saveDailyField('fiber',this.value)"></div>` :
        `<div><label class="label">Weight (lbs)</label>
            <input type="number" inputmode="decimal" step="0.1" class="input-field" value="${log.weight||''}" placeholder="Current" onchange="saveDailyField('weight',this.value)"></div>`}
    </div>
    ${p.fiber_target ? `<div class="mt-3"><label class="label">Weight (lbs)</label>
        <input type="number" inputmode="decimal" step="0.1" class="input-field" value="${log.weight||''}" placeholder="Step on the scale..." onchange="saveDailyField('weight',this.value)"></div>` : ''}
    </div>`;

    // === WORKOUT ===
    const capWk = profileIs(p,'karen') ? Math.min(wk,12) : Math.min(wk,4);
    html += `<div class="card"><div class="section-title">Workout &mdash; Week ${capWk}</div>`;
    if (profileIs(p,'grumpy')) {
        if (todaySched.type==='training') {
            const plan = GRUMPY_CALISTHENICS[Math.min(wk,4)-1];
            html += `<div class="text-sm text-amber-400 font-semibold mb-2">${plan.name}</div>
                <div class="space-y-1 mb-3">${plan.exercises.map(e=>`<div class="flex justify-between text-sm"><span class="text-gray-300">${e.name}</span><span class="text-gray-500">${e.detail}</span></div>`).join('')}</div>`;
        } else if (todaySched.type==='walk') { html += '<div class="text-gray-300 mb-3">&#x1F6B6; 45-minute brisk walk</div>'; }
        else { html += '<div class="text-gray-300 mb-3">&#x1F9D8; Recovery day &mdash; easy walk + stretching/core</div>'; }
    } else if (profileIs(p,'karen')) {
        const tier = KAREN_TREADMILL.find(t=>t.weeks.includes(Math.min(wk,12))) || KAREN_TREADMILL[2];
        if (todaySched.type==='treadmill') {
            html += `<div class="text-sm text-amber-400 font-semibold mb-2">${tier.tier} Phase</div>
                <div class="grid grid-cols-2 gap-2 mb-3 text-sm">
                    <div class="bg-gray-800 rounded-lg p-2 text-center"><div class="text-gray-500">Duration</div><div class="text-white font-bold">${tier.duration}</div></div>
                    <div class="bg-gray-800 rounded-lg p-2 text-center"><div class="text-gray-500">Incline</div><div class="text-white font-bold">${tier.incline}</div></div>
                    <div class="bg-gray-800 rounded-lg p-2 text-center"><div class="text-gray-500">Speed</div><div class="text-white font-bold">${tier.speed}</div></div>
                    <div class="bg-gray-800 rounded-lg p-2 text-center"><div class="text-gray-500">Sessions/wk</div><div class="text-white font-bold">${tier.sessions}x</div></div>
                </div><div class="text-xs text-gray-500 mb-3">&#x1F9BA; 8 lb weighted vest &bull; No handrails</div>`;
        } else { html += '<div class="text-gray-300 mb-3">&#x1F9D8; Rest day</div>'; }
    } else { html += `<div class="text-gray-300 mb-3">${todaySched.workout}</div>`; }

    const done = log.workout && log.workout.completed;
    html += `<button onclick="toggleWorkout()" class="w-full py-3 rounded-xl font-bold transition-all active:scale-[0.97] ${done?'bg-emerald-700 text-white':'bg-gray-700 hover:bg-gray-600 text-white'}">
        ${done ? '&#x2705; Workout Complete' : '&#x25CB; Mark Workout Complete'}</button>
        <button onclick="showScreen('workout')" class="w-full mt-2 py-2 text-sm text-gray-500 hover:text-amber-400 transition">View Full Plan &rarr;</button></div>`;

    // === WEIGHT CHART ===
    html += `<div class="card"><div class="section-title">Weight Progress</div>
        <div class="relative" style="height:200px"><canvas id="weight-chart"></canvas></div>
        <div class="flex justify-between text-xs text-gray-500 mt-2"><span>Start: ${p.start_weight||'?'} lbs</span><span>Goal: ${p.goal_weight||'?'} lbs</span></div></div>`;

    document.getElementById('dash-content').innerHTML = html;
    setTimeout(() => renderWeightChart(p, weightHist), 50);
}

// ║                 10. DAILY LOGGING                           ║

async function saveDailyField(field, value) {
    try {
        await ensureTodayLog();
        todayLog[field] = value ? parseFloat(value) : null;
        await upsertTodayLog();
    } catch (e) { alert('Save error: ' + e.message); }
}

async function logShot(peptide) {
    try {
        await ensureTodayLog();
        if (!todayLog.shots) todayLog.shots = {};
        if (todayLog.shots[peptide] && (Date.now() - new Date(todayLog.shots[peptide]).getTime()) < 86400000) {
            if (!confirm('Shot already logged. Undo?')) return;
            delete todayLog.shots[peptide];
        } else {
            todayLog.shots[peptide] = new Date().toISOString();
        }
        await upsertTodayLog();
        await loadDashboard();
    } catch (e) { alert('Error: ' + e.message); }
}

async function toggleWorkout() {
    try {
        await ensureTodayLog();
        if (!todayLog.workout) todayLog.workout = { completed: false, notes: '' };
        todayLog.workout = { ...todayLog.workout, completed: !todayLog.workout.completed };
        await upsertTodayLog();
        await loadDashboard();
    } catch (e) { alert('Error: ' + e.message); }
}

function renderWeightChart(profile, entries) {
    const canvas = document.getElementById('weight-chart');
    if (!canvas) return;
    if (weightChart) { weightChart.destroy(); weightChart = null; }
    if (!entries || entries.length < 1) {
        canvas.parentElement.innerHTML = '<div class="flex items-center justify-center h-full text-gray-600 text-sm">Log your weight to see the chart</div>';
        return;
    }
    const labels = entries.map(e => formatDateShort(e.log_date));
    const data = entries.map(e => parseFloat(e.weight));
    const goal = Array(data.length).fill(profile.goal_weight);
    weightChart = new Chart(canvas, {
        type: 'line',
        data: { labels, datasets: [
            { label:'Weight', data, borderColor:'#f59e0b', backgroundColor:'rgba(245,158,11,0.08)', fill:true, tension:0.3, pointRadius:data.length>30?0:4, pointBackgroundColor:'#f59e0b', borderWidth:2 },
            { label:'Goal', data:goal, borderColor:'#ef4444', borderDash:[6,6], pointRadius:0, borderWidth:1, fill:false }
        ]},
        options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{backgroundColor:'#1f2937',titleColor:'#f59e0b',bodyColor:'#e5e7eb',borderColor:'#374151',borderWidth:1} },
            scales:{ x:{ticks:{color:'#6b7280',maxTicksLimit:8,font:{size:10}},grid:{color:'#1f2937'}}, y:{ticks:{color:'#6b7280',font:{size:10}},grid:{color:'#1f2937'}} } }
    });
}

async function loadLab(preserveScroll) {
    const scrollY = preserveScroll ? window.scrollY : 0;
    if (!preserveScroll) showLoading('lab-content');
    try {
        const [masters, pens, types, inv, profiles] = await Promise.all([
            fetchActiveMasters(), fetchActivePens(), fetchPeptideTypes(), fetchInventory(), fetchAllProfiles()
        ]);
        renderLab(masters, pens, types, inv, profiles);
        if (preserveScroll) setTimeout(() => window.scrollTo(0, scrollY), 50);
    } catch (e) { document.getElementById('lab-content').innerHTML = `<div class="text-red-400 text-center py-12">${e.message}</div>`; }
}

    // === RECONSTITUTE MASTER VIAL ===
    html += `<div class="card"><div class="section-title">&#x1F9EA; Step 1: Reconstitute Master Vial</div>
        <p class="text-xs text-gray-500 mb-3">Add BAC water to an unmixed vial. This creates a Mother Vial you'll draw from later.</p>
        <div class="space-y-3">

                ${types.map(t=>`<option>${t.name}</option>`).join('')}</select></div>
            <div class="grid grid-cols-2 gap-3">
                <div><label class="label">Total MG in vial</label><input type="number" inputmode="decimal" class="input-field" id="master-mg" placeholder="e.g. 20"></div>

// Lab actions — Mixing Calculator
function updateMixCalc() {
    const mg=parseFloat(document.getElementById('mix-mg')?.value), water=parseFloat(document.getElementById('mix-water')?.value), dose=parseFloat(document.getElementById('mix-dose')?.value);
    const r=document.getElementById('mix-result'), u=document.getElementById('mix-units');
    if(mg&&water){ const conc=mg/water; r.innerHTML=`<div class="text-amber-400 font-bold">${conc.toFixed(2)} mg/mL</div><div class="text-gray-400 text-xs">${(water*100).toFixed(0)} total units &bull; ${(mg/(water*100)).toFixed(4)} mg/unit</div>`; } else { r.innerHTML='Enter values above'; }
    if(mg&&water&&dose){ const conc=mg/water; u.textContent=calcUnitsFromConc(dose,conc)+' units'; } else { u.innerHTML='&mdash;'; }
}

// Lab actions — Master Vial preview
document.addEventListener('input', e => {
    if (e.target.id === 'master-mg' || e.target.id === 'master-water') {
        const mg = parseFloat(document.getElementById('master-mg')?.value);
        const ml = parseFloat(document.getElementById('master-water')?.value);
        const el = document.getElementById('master-preview');
        if (el && mg && ml) {
            const conc = (mg / ml).toFixed(2);
            el.innerHTML = `<div class="text-amber-400 font-bold">${conc} mg/mL</div><div class="text-gray-400 text-xs">${mg}mg &divide; ${ml}mL</div>`;
        } else if (el) { el.innerHTML = 'Concentration will show here'; }
    }
});

async function reconstituteMaster() {
    const peptide = document.getElementById('master-peptide').value;
    const mg = parseFloat(document.getElementById('master-mg').value);
    const ml = parseFloat(document.getElementById('master-water').value);
    const date = document.getElementById('master-date').value;
    if (!peptide || !mg || !ml || !date) { alert('Fill all fields.'); return; }
    try {
        await insertMasterVial(peptide, mg, ml, date);
        const match = cachedInventory.find(i => i.item_name.toLowerCase().includes(peptide.toLowerCase()));
        if (match && match.count > 0) await setInventoryCount(match.id, match.count - 1);
        await loadLab(true);
    } catch(e) { alert('Error: ' + e.message); }
}

async function depleteMaster(id) {
    if (!confirm('Mark this master vial as depleted?')) return;
    try { await markMasterDepleted(id); await loadLab(true); } catch(e) { alert(e.message); }
}

// Lab actions — Pen preview & fill
function updatePenPreview() {
    const sel = document.getElementById('pen-master');
    const opt = sel?.selectedOptions[0];
    const mlMaster = parseFloat(document.getElementById('pen-ml-master')?.value);
    const mlWater = parseFloat(document.getElementById('pen-ml-water')?.value) || 0;
    const el = document.getElementById('pen-preview');
    if (!el) return;

    if (!opt?.value || !mlMaster) { el.innerHTML = 'Select a master and enter volumes'; return; }

    const masterConc = parseFloat(opt.dataset.conc);
    const remaining = parseFloat(opt.dataset.remaining);
    const mgInPen = (masterConc * mlMaster);
    const totalMl = mlMaster + mlWater;
    const penConc = mgInPen / totalMl;

    let warn = '';
    if (mlMaster > remaining) warn = `<div class="text-red-400 text-sm font-bold mt-1">&#x26A0; Only ${remaining}mL left in master!</div>`;

    el.innerHTML = `<div class="grid grid-cols-3 gap-2 text-center">
        <div><div class="text-gray-500 text-xs">mg in pen</div><div class="text-white font-bold">${mgInPen.toFixed(2)}</div></div>
        <div><div class="text-gray-500 text-xs">total mL</div><div class="text-white font-bold">${totalMl.toFixed(1)}</div></div>
        <div><div class="text-gray-500 text-xs">concentration</div><div class="text-amber-400 font-bold">${penConc.toFixed(2)} mg/mL</div></div>
    </div>${warn}`;
}

async function fillPen() {
    const sel = document.getElementById('pen-master');
    const opt = sel?.selectedOptions[0];
    const mlMaster = parseFloat(document.getElementById('pen-ml-master')?.value);
    const mlWater = parseFloat(document.getElementById('pen-ml-water')?.value) || 0;
    const date = document.getElementById('pen-date').value;
    const assignTo = document.getElementById('pen-assign')?.value || null;

    if (!opt?.value || !mlMaster || !date) { alert('Select a master vial and enter mL to draw.'); return; }

    const masterId = opt.value;
    const masterConc = parseFloat(opt.dataset.conc);
    const remaining = parseFloat(opt.dataset.remaining);
    const peptide = opt.dataset.peptide;

    if (mlMaster > remaining) { alert(`Only ${remaining}mL remaining in that master. Reduce the draw.`); return; }

    const mgInPen = masterConc * mlMaster;
    const totalMl = mlMaster + mlWater;
    const penConc = mgInPen / totalMl;

    try {
        await insertPen(masterId, peptide, mlMaster, mlWater, totalMl, parseFloat(mgInPen.toFixed(4)), parseFloat(penConc.toFixed(4)), date, assignTo);
        await updateMasterRemaining(masterId, parseFloat((remaining - mlMaster).toFixed(2)));
        await loadLab(true);
    } catch(e) { alert('Error: ' + e.message); }
}

async function depletePen(id) {
    if (!confirm('Mark this pen as depleted?')) return;
    try { await markPenDepleted(id); await loadLab(true); } catch(e) { alert(e.message); }
}

async function changeInventory(id, newCount) {
    try {
        await setInventoryCount(id, newCount);
        await loadLab(true);
    } catch(e){ alert('Inventory update failed: ' + e.message + '\n\nIf permission denied, run in Supabase SQL Editor:\nUPDATE profiles SET is_admin = true WHERE display_name = \'Grumpy\';'); }
}

async function addPeptideType() {
    const name=document.getElementById('new-pep-name').value.trim(), size=document.getElementById('new-pep-size').value.trim();
    if(!name||!size){ alert('Enter name and vial size.'); return; }
    try {
        await insertPeptideType(name, size);
        await upsertInventoryItem(name+' '+size, 0);
        await loadLab(true);
    } catch(e){ alert(e.message); }
}

async function removePeptideType(id, name) {
    if(!confirm(`Remove "${name}"?`)) return;
    try { await deletePeptideType(id); await loadLab(true); } catch(e){ alert(e.message); }
}

async function updateUserDose(userId, peptide, value) {
    try {
        const profiles = await fetchAllProfiles();
        const user = profiles.find(p => p.id === userId);
        if(!user) return;
        const doses = { ...(user.current_doses || {}) };
        const mg = parseFloat(value);
        if(mg > 0) doses[peptide] = mg; else delete doses[peptide];
        await updateProfileField(userId, { current_doses: doses });
        await loadLab(true);
    } catch(e){ alert(e.message); }
}

async function addUserPeptide(userId) {
    const sel = document.getElementById('add-pep-'+userId);
    if(!sel||!sel.value) return;
    try {
        const profiles = await fetchAllProfiles();
        const user = profiles.find(p => p.id === userId);
        if(!user) return;
        const current = user.peptide_type ? user.peptide_type.split(' + ').map(s=>s.trim()).filter(Boolean) : [];
        current.push(sel.value);
        await updateProfileField(userId, { peptide_type: current.join(' + ') });
        await loadLab(true);
    } catch(e){ alert(e.message); }
}

async function removeUserPeptide(userId, peptide) {
    try {
        const profiles = await fetchAllProfiles();
        const user = profiles.find(p => p.id === userId);
        if(!user) return;
        const current = user.peptide_type ? user.peptide_type.split(' + ').map(s=>s.trim()).filter(Boolean) : [];
        const updated = current.filter(p => p !== peptide);
        const doses = { ...(user.current_doses || {}) };
        delete doses[peptide];
        await updateProfileField(userId, { peptide_type: updated.join(' + '), current_doses: doses });
        await loadLab(true);
    } catch(e){ alert(e.message); }
}

function renderWorkoutPlan() {
    const p = currentProfile;

        html += `<div class="card"><div class="section-title">Weekly Metabolic Calendar</div><div class="space-y-2 text-sm">
            ${Object.entries(GRUMPY_SCHEDULE).map(([d,s])=>{
                const today=parseInt(d)===dayOfWeek();
                const icon = s.window==='morning' ? '&#x1F305;' : '&#x1F319;';
                return `<div class="flex items-center gap-3 p-2 rounded-lg ${today?'bg-amber-900/30 border border-amber-700':''}">
                    <span class="w-10 font-bold ${today?'text-amber-400':'text-gray-500'}">${DAYS_SHORT[d]}</span>
                    <span class="text-xs">${icon}</span>
                    <span class="text-gray-300 flex-1">${s.shots.join(' + ') || 'Rest'}</span>
                    <span class="text-gray-500 text-xs">${s.workout}</span></div>`;
            }).join('')}</div></div>`;
        html += `<div class="card"><div class="section-title">4-Week Calisthenics Progression</div><div class="text-sm text-gray-400 mb-3">Current: Week ${Math.min(wk,4)}</div>`;
        GRUMPY_CALISTHENICS.forEach(week=>{
            const cur=Math.min(wk,4)===week.week;
            html += `<div class="mb-4 ${cur?'bg-amber-900/20 border border-amber-800 rounded-lg p-3':''}">
                <div class="font-bold ${cur?'text-amber-400':'text-gray-400'} mb-2">Week ${week.week}: ${week.name} ${cur?'(Current)':''}</div>
                <div class="space-y-1">${week.exercises.map(e=>`<div class="flex justify-between"><span class="text-gray-300">${e.name}</span><span class="text-gray-500">${e.detail}</span></div>`).join('')}</div></div>`;
        });
        html += '</div>';
    } else if (profileIs(p,'karen')) {
        html += `<div class="card"><div class="section-title">Treadmill Incline Progression</div>
            <div class="text-sm text-gray-400 mb-1">Week ${Math.min(wk,12)} &bull; 8 lb vest &bull; No handrails</div>
            <div class="text-xs text-gray-600 mb-4">&#x26A0; STRICTLY treadmill walking only. No calisthenics.</div>`;
        KAREN_TREADMILL.forEach(tier=>{
            const cur=tier.weeks.includes(Math.min(wk,12));
            html += `<div class="mb-3 p-3 rounded-lg ${cur?'bg-amber-900/20 border border-amber-800':'bg-gray-800'}">
                <div class="font-bold ${cur?'text-amber-400':'text-gray-400'} mb-2">${tier.tier} ${cur?'(Current)':''}</div>
                <div class="text-xs text-gray-500 mb-2">Weeks ${tier.weeks[0]}-${tier.weeks[tier.weeks.length-1]}</div>
                <div class="grid grid-cols-2 gap-2 text-sm">
                    <div><span class="text-gray-500">Duration:</span> <span class="text-white">${tier.duration}</span></div>
                    <div><span class="text-gray-500">Incline:</span> <span class="text-white">${tier.incline}</span></div>
                    <div><span class="text-gray-500">Speed:</span> <span class="text-white">${tier.speed}</span></div>
                    <div><span class="text-gray-500">Sessions:</span> <span class="text-white">${tier.sessions}x/week</span></div>
                </div></div>`;
        });
        html += '</div>';
        html += `<div class="card"><div class="section-title">Weekly Schedule</div><div class="space-y-2 text-sm">
            ${Object.entries(KAREN_SCHEDULE).map(([d,s])=>{
                const today=parseInt(d)===dayOfWeek();
                const icon = s.window==='morning' ? '&#x1F305;' : '&#x1F319;';
                return `<div class="flex items-center gap-3 p-2 rounded-lg ${today?'bg-amber-900/30 border border-amber-700':''}">
                    <span class="w-10 font-bold ${today?'text-amber-400':'text-gray-500'}">${DAYS_SHORT[d]}</span>
                    <span class="text-xs">${icon}</span>
                    <span class="text-gray-300 flex-1">${s.shots.join(' + ') || 'Rest'}</span>
                    <span class="text-gray-500 text-xs">${s.workout}</span></div>`;
            }).join('')}</div></div>`;
    } else {
        html += '<div class="card"><div class="text-gray-500 text-center py-8">Custom workout plan not configured.</div></div>';
    }
    document.getElementById('workout-content').innerHTML = html;
}

async function loadSettings() {
    showLoading('settings-content');
    try {
        const [recentLogs, allProfiles] = await Promise.all([
            fetchRecentLogs(14),
            isAdmin(currentProfile) ? fetchAllProfiles() : Promise.resolve([])
        ]);
        let todayLogs = [];
        if (isAdmin(currentProfile)) {
            const { data } = await sb.from('daily_logs').select('*').eq('log_date', todayStr());
            todayLogs = data || [];
        }
        renderSettings(recentLogs, allProfiles, todayLogs);
    } catch(e) { document.getElementById('settings-content').innerHTML = `<div class="text-red-400 text-center py-12">${e.message}</div>`; }
}

function renderSettings(recentLogs, allProfiles, todayLogs) {
    const p = currentProfile;
    let html = '';

    html += `<div class="card"><div class="section-title">Profile</div><div class="space-y-2 text-sm">
        <div class="flex justify-between"><span class="text-gray-400">Name</span><span class="text-white">${p.display_name}</span></div>
        <div class="flex justify-between"><span class="text-gray-400">Email</span><span class="text-white text-xs">${currentSession.user.email}</span></div>
        <div class="flex justify-between"><span class="text-gray-400">Start Weight</span><span class="text-white">${p.start_weight||'?'} lbs</span></div>
        <div class="flex justify-between"><span class="text-gray-400">Goal Weight</span><span class="text-white">${p.goal_weight||'?'} lbs</span></div>
        <div class="flex justify-between"><span class="text-gray-400">Calories</span><span class="text-white">${p.calorie_target} kcal</span></div>
        <div class="flex justify-between"><span class="text-gray-400">Protein</span><span class="text-white">${p.protein_min}-${p.protein_max}g</span></div>
        <div class="flex justify-between"><span class="text-gray-400">Peptides</span><span class="text-white text-right text-xs">${p.peptide_type||'N/A'}</span></div>
        <div class="flex justify-between"><span class="text-gray-400">Program Start</span><span class="text-white">${p.program_start?formatDate(p.program_start):'N/A'}</span></div>
        <div class="flex justify-between"><span class="text-gray-400">Current Week</span><span class="text-amber-400 font-bold">${weekNum(p)}</span></div>
    </div></div>`;

    // Admin: all users summary
    if (isAdmin(p) && allProfiles.length > 0) {
        html += `<div class="card"><div class="section-title">All Users &mdash; Today's Summary</div>`;
        allProfiles.forEach(u => {
            const log = todayLogs.find(l => l.user_id === u.id);
            html += `<div class="bg-gray-800 rounded-lg p-3 mb-2">
                <div class="font-bold text-amber-400 text-sm">${u.display_name}</div>
                <div class="text-xs text-gray-400 mt-1">
                    ${log ? `${log.weight?log.weight+'lb ':''} ${log.calories?log.calories+'cal ':''} ${log.protein?log.protein+'g ':''} ${log.workout?.completed?'&#x2705; Workout':''}` : '<span class="text-gray-600">No log today</span>'}
                </div></div>`;
        });
        html += '</div>';
    }

    // Export
    html += `<div class="card"><div class="section-title">Data Export</div>
        <p class="text-xs text-gray-500 mb-3">Download your log history as JSON.</p>
        <button onclick="exportMyData()" class="btn-secondary">&#x1F4BE; Export My Logs</button></div>`;

    // Log history
    if (recentLogs.length > 0) {
        html += `<div class="card"><div class="section-title">Recent Log History</div><div class="space-y-1 text-sm">`;
        recentLogs.forEach(l => {
            html += `<div class="flex justify-between items-center py-1 border-b border-gray-800">
                <span class="text-gray-400">${formatDate(l.log_date)}</span>
                <span class="text-gray-500 text-xs">${l.weight?l.weight+'lb ':''} ${l.calories?l.calories+'cal ':''} ${l.protein?l.protein+'g ':''} ${l.workout?.completed?'&#x2705;':''}</span>
            </div>`;
        });
        html += '</div></div>';
    }

    // Logout
    html += `<button onclick="handleLogout()" class="btn-danger mt-4">Sign Out</button>`;

    document.getElementById('settings-content').innerHTML = html;
}

async function exportMyData() {
    try {
        const { data } = await sb.from('daily_logs').select('*').eq('user_id', currentSession.user.id).order('log_date');
        const blob = new Blob([JSON.stringify({ profile: currentProfile, logs: data }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `peptide-cc-${currentProfile.display_name}-${todayStr()}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    } catch(e) { alert(e.message); }
}

// ╔══════════════════════════════════════════════════════════════╗
// ║                 16. REAL-TIME SUBSCRIPTIONS                 ║
// ╚══════════════════════════════════════════════════════════════╝

function setupRealtime() {
    sb.channel('lab-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'master_vials' }, () => {
            const onDash = !document.getElementById('screen-dashboard').classList.contains('hidden');
            const onLab = !document.getElementById('screen-lab').classList.contains('hidden');
            if (onDash) loadDashboard();
            if (onLab) loadLab(true);
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'pens' }, () => {
            const onDash = !document.getElementById('screen-dashboard').classList.contains('hidden');
            const onLab = !document.getElementById('screen-lab').classList.contains('hidden');
            if (onDash) loadDashboard();
            if (onLab) loadLab(true);
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'inventory' }, () => {
            if (!document.getElementById('screen-lab').classList.contains('hidden')) loadLab(true);
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'peptide_types' }, () => {
            if (!document.getElementById('screen-lab').classList.contains('hidden')) loadLab(true);
        })
        .subscribe();
}

// ╔══════════════════════════════════════════════════════════════╗
// ║                 17. INIT                                    ║
// ╚══════════════════════════════════════════════════════════════╝

async function init() {
    // Check for existing session
    const { data: { session } } = await sb.auth.getSession();

    // Listen for auth changes
    sb.auth.onAuthStateChange(async (event, session) => {
        currentSession = session;
        if (session) {
            try {
                currentProfile = await fetchProfile();
                todayLog = null; // reset cache
                setupRealtime();
                showScreen('dashboard');
            } catch (e) {
                console.error('Profile load failed:', e);
                alert('Failed to load profile: ' + e.message);
                showScreen('auth');
            }
        } else {
            currentProfile = null;
            todayLog = null;
            showScreen('auth');
        }
    });

    // Show appropriate screen
    if (session) {
        currentSession = session;
        try {
            currentProfile = await fetchProfile();
            setupRealtime();
            showScreen('dashboard');
        } catch (e) {
            showScreen('auth');
        }
    } else {
        showScreen('auth');
    }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
