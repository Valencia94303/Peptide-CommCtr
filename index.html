const STORAGE_KEY = 'peptide_cc';

let currentUser = null;
let weightChart = null;

function defaultState() {

function loadState() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            state = JSON.parse(raw);
            // Ensure lab structure exists for older data
            if (!state.lab) state.lab = { mixedVials: [], inventory: {} };
            if (!state.lab.mixedVials) state.lab.mixedVials = [];
            if (!state.lab.inventory) state.lab.inventory = {};
            INVENTORY_ITEMS.forEach(item => {
                if (state.lab.inventory[item] === undefined) state.lab.inventory[item] = 0;
            });
        } else {
            state = defaultState();
            saveState();
        }
    } catch (e) {
        console.error('Failed to load state:', e);
        state = defaultState();
    }
}

function saveState() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
        console.error('Failed to save state:', e);
    }
}

function getLog(userId, date) {
    if (!state.logs[userId]) state.logs[userId] = {};
    if (!state.logs[userId][date]) state.logs[userId][date] = { calories: '', protein: '', weight: '', water: '', fiber: '', shots: {}, workout: { completed: false, notes: '' } };
    return state.logs[userId][date];
}

// ╔══════════════════════════════════════════════════════════════╗
// ║                    3. UTILITIES                             ║
// ╚══════════════════════════════════════════════════════════════╝

function todayStr() { return new Date().toISOString().split('T')[0]; }
function dayOfWeek() { return new Date().getDay(); }

function formatDate(str) {
    const d = new Date(str + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function formatDateLong(str) {
    const d = new Date(str + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function formatDateShort(str) {
    const d = new Date(str + 'T12:00:00');
    return (d.getMonth()+1) + '/' + d.getDate();
}

function daysSince(dateStr) {
    const then = new Date(dateStr + 'T12:00:00');
    const now = new Date();
    now.setHours(12,0,0,0);
    return Math.floor((now - then) / 86400000);
}

function weekNumber(userId) {
    const user = state.users[userId];
    if (!user || !user.programStart) return 1;
    const days = daysSince(user.programStart);
    return Math.max(1, Math.floor(days / 7) + 1);
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

function isShotLogged(userId, peptide) {
    const log = getLog(userId, todayStr());
    if (!log.shots || !log.shots[peptide]) return false;
    const ts = new Date(log.shots[peptide]);
    return (Date.now() - ts.getTime()) < 86400000;
}

function getSchedule(userId) {
    if (userId === 'grumpy') return GRUMPY_SCHEDULE;
    if (userId === 'karen') return KAREN_SCHEDULE;
    // Custom users get a generic schedule
    return {
        0: { peptide: 'Rest', peptides: [], workout: 'Rest', type: 'rest' },
        1: { peptide: 'Primary Peptide', peptides: ['Primary'], workout: 'Exercise', type: 'training' },
        2: { peptide: 'MOTS-c', peptides: ['MOTS-c'], workout: 'Exercise', type: 'training' },
        3: { peptide: 'Rest', peptides: [], workout: 'Rest', type: 'rest' },
        4: { peptide: 'MOTS-c', peptides: ['MOTS-c'], workout: 'Exercise', type: 'training' },
        5: { peptide: 'Rest', peptides: [], workout: 'Rest', type: 'rest' },
        6: { peptide: 'MOTS-c', peptides: ['MOTS-c'], workout: 'Exercise', type: 'training' }
    };
}

function getWeeklyLossRate(userId) {
    const logs = state.logs[userId] || {};
    const entries = Object.entries(logs)
        .filter(([_, l]) => l.weight && parseFloat(l.weight) > 0)
        .sort(([a], [b]) => a.localeCompare(b));
    if (entries.length < 2) return null;
    const recent = entries.slice(-7);
    if (recent.length < 2) return null;
    const first = parseFloat(recent[0][1].weight);
    const last = parseFloat(recent[recent.length - 1][1].weight);
    const daysBetween = daysSince(recent[0][0]) - daysSince(recent[recent.length - 1][0]);
    const actualDays = Math.abs((new Date(recent[recent.length-1][0]+'T12:00:00') - new Date(recent[0][0]+'T12:00:00')) / 86400000);
    if (actualDays < 3) return null;
    return ((first - last) / actualDays) * 7;
}

function getLatestWeight(userId) {
    const logs = state.logs[userId] || {};
    const entries = Object.entries(logs)
        .filter(([_, l]) => l.weight && parseFloat(l.weight) > 0)
        .sort(([a], [b]) => b.localeCompare(a));
    return entries.length > 0 ? parseFloat(entries[0][1].weight) : null;
}

function calcUnits(doseMg, vialMg, waterMl) {
    if (!vialMg || !waterMl || !doseMg) return 0;
    return ((doseMg / vialMg) * waterMl * 100).toFixed(1);
}

function showScreen(name) {
    document.querySelectorAll('#app > div').forEach(el => el.classList.add('hidden'));
    const screen = document.getElementById('screen-' + name);
    if (screen) {
        screen.classList.remove('hidden');
        screen.classList.add('fade-in');
    }

    if (name === 'select') { currentUser = null; renderUserSelect(); }
    if (name === 'dashboard') renderDashboard();
    if (name === 'lab') renderLab();
    if (name === 'workout') renderWorkoutPlan();
    if (name === 'settings') renderSettings();

    window.scrollTo(0, 0);
}

function showModal(html) {
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal-overlay').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    document.body.style.overflow = '';
}

function promptPasscode(action, userId) {

            </div>
            <p id="pin-error" class="text-red-500 text-sm mb-4 hidden">Wrong passcode</p>
            <div class="grid grid-cols-3 gap-3 max-w-[240px] mx-auto">
                ${[1,2,3,4,5,6,7,8,9].map(n => `<button onclick="pinInput('${n}','${action}','${userId||''}')" class="h-14 bg-gray-800 hover:bg-gray-700 rounded-xl text-xl font-bold text-white transition active:scale-95">${n}</button>`).join('')}
                <button onclick="pinClear()" class="h-14 bg-gray-800 hover:bg-gray-700 rounded-xl text-sm font-bold text-gray-400 transition active:scale-95">CLR</button>
                <button onclick="pinInput('0','${action}','${userId||''}')" class="h-14 bg-gray-800 hover:bg-gray-700 rounded-xl text-xl font-bold text-white transition active:scale-95">0</button>
                <button onclick="pinBackspace()" class="h-14 bg-gray-800 hover:bg-gray-700 rounded-xl text-xl font-bold text-gray-400 transition active:scale-95">&larr;</button>
            </div>
        </div>`;
    showModal(html);
    window._pinValue = '';
    window._pinAction = action;
    window._pinUserId = userId || '';
}

function pinInput(digit, action, userId) {
    if (window._pinValue.length >= 4) return;
    window._pinValue += digit;
    updatePinDisplay();
    if (window._pinValue.length === 4) {
        setTimeout(() => checkPasscode(), 150);
    }
}

function pinBackspace() {
    window._pinValue = window._pinValue.slice(0, -1);
    updatePinDisplay();
    document.getElementById('pin-error').classList.add('hidden');
}

function pinClear() {
    window._pinValue = '';
    updatePinDisplay();
    document.getElementById('pin-error').classList.add('hidden');
}

function updatePinDisplay() {
    for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('pin-dot-' + i);
        if (dot) dot.innerHTML = i < window._pinValue.length ? '&#x2022;' : '&middot;';
    }
}

function checkPasscode() {
    if (window._pinValue === state.passcode) {
        closeModal();
        if (window._pinAction === 'login') selectUser(window._pinUserId);
        else if (window._pinAction === 'addUser') showAddUserForm();
        else if (window._pinAction === 'changePasscode') showChangePasscodeForm();
    } else {
        document.getElementById('pin-error').classList.remove('hidden');
        window._pinValue = '';
        updatePinDisplay();
    }
}

function renderWarnings() {
    if (!currentUser) return '';
    const user = state.users[currentUser];
    let html = '';

    // Gaunt Check: under 150 lbs + losing > 2 lbs/week
    const weight = getLatestWeight(currentUser);
    const rate = getWeeklyLossRate(currentUser);
    if (weight !== null && weight < 150 && rate !== null && rate > 2) {
        html += `<div class="bg-red-900/60 border-2 border-red-600 rounded-xl p-4 expiry-pulse">
            <div class="font-bold text-red-400 text-lg">&#x26A0; Gaunt Check Warning</div>
            <div class="text-red-300 text-sm mt-1">Losing ${rate.toFixed(1)} lbs/week at ${weight} lbs. Consider increasing calories by 150 kcal to protect muscle and collagen.</div>
        </div>`;
    }

    // General over-loss warning
    if (rate !== null && rate > user.warningThreshold) {
        html += `<div class="bg-yellow-900/50 border border-yellow-600 rounded-xl p-4">
            <div class="font-bold text-yellow-400">&#x26A0; Losing Too Fast</div>
            <div class="text-yellow-300 text-sm mt-1">Rate: ${rate.toFixed(1)} lbs/week (threshold: ${user.warningThreshold}). Increase calories to prevent muscle wasting.</div>
        </div>`;
    }

    // Expired vials for admin
    if (user.isAdmin) {
        state.lab.mixedVials.forEach(v => {
            if (!v.depleted && daysSince(v.mixedDate) > 28) {
                html += `<div class="bg-red-900/60 border border-red-700 rounded-xl p-3">
                    <div class="font-bold text-red-400 text-sm">&#x26A0; ${v.peptide} vial for ${state.users[v.assignedTo]?.name || v.assignedTo} EXPIRED (${daysSince(v.mixedDate)} days)</div>
                </div>`;
            }
        });
    }

    return html;
}

// ║                    7. DAILY LOGGING                         ║

function saveDailyField(field, value) {
    const log = getLog(currentUser, todayStr());
    log[field] = value;
    saveState();
}

function logShot(peptide) {
    const log = getLog(currentUser, todayStr());
    if (!log.shots) log.shots = {};
    if (isShotLogged(currentUser, peptide)) {
        // Already logged; confirm un-log
        if (confirm('Shot already logged. Undo?')) {
            delete log.shots[peptide];
            saveState();
            renderDashboard();
        }
        return;
    }
    log.shots[peptide] = new Date().toISOString();
    saveState();
    renderDashboard();
}

function toggleWorkout() {
    const log = getLog(currentUser, todayStr());
    if (!log.workout) log.workout = { completed: false, notes: '' };
    log.workout.completed = !log.workout.completed;
    saveState();
    renderDashboard();
}

function renderWeightChart() {
    const canvas = document.getElementById('weight-chart');
    if (!canvas) return;
    if (weightChart) { weightChart.destroy(); weightChart = null; }

    const user = state.users[currentUser];
    const logs = state.logs[currentUser] || {};
    const entries = Object.entries(logs)
        .filter(([_, l]) => l.weight && parseFloat(l.weight) > 0)
        .sort(([a], [b]) => a.localeCompare(b));

    if (entries.length < 1) {
        canvas.parentElement.innerHTML = '<div class="flex items-center justify-center h-full text-gray-600 text-sm">Log your weight to see the chart</div>';
        return;
    }

    const labels = entries.map(([d]) => formatDateShort(d));
    const data = entries.map(([_, l]) => parseFloat(l.weight));
    const goalData = Array(data.length).fill(user.goalWeight);

    weightChart = new Chart(canvas, {
        type: 'line',
        data: {
            labels,
            datasets: [
                {
                    label: 'Weight',
                    data,
                    borderColor: '#f59e0b',
                    backgroundColor: 'rgba(245, 158, 11, 0.08)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: data.length > 30 ? 0 : 4,
                    pointBackgroundColor: '#f59e0b',
                    borderWidth: 2
                },
                {
                    label: 'Goal',
                    data: goalData,
                    borderColor: '#ef4444',
                    borderDash: [6, 6],
                    pointRadius: 0,
                    borderWidth: 1,
                    fill: false
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#1f2937',
                    titleColor: '#f59e0b',
                    bodyColor: '#e5e7eb',
                    borderColor: '#374151',
                    borderWidth: 1
                }
            },
            scales: {
                x: { ticks: { color: '#6b7280', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: '#1f2937' } },
                y: { ticks: { color: '#6b7280', font: { size: 10 } }, grid: { color: '#1f2937' } }
            }
        }
    });
}

function updateMixCalc() {
    const mg = parseFloat(document.getElementById('mix-mg')?.value);
    const water = parseFloat(document.getElementById('mix-water')?.value);
    const dose = parseFloat(document.getElementById('mix-dose')?.value);
    const resultEl = document.getElementById('mix-result');
    const unitsEl = document.getElementById('mix-units');

    if (mg && water) {
        const concentration = mg / (water * 100);
        resultEl.innerHTML = `<div class="text-amber-400 font-bold">${concentration.toFixed(4)} mg per unit</div>
            <div class="text-gray-400 text-xs">${(water * 100).toFixed(0)} total units in syringe</div>`;
    } else {
        resultEl.innerHTML = 'Enter values above';
    }

    if (mg && water && dose) {
        const units = calcUnits(dose, mg, water);
        unitsEl.textContent = units + ' units';
    } else {
        unitsEl.innerHTML = '&mdash;';
    }
}

function mixVial() {
    const peptide = document.getElementById('vial-peptide').value;
    const mg = parseFloat(document.getElementById('vial-mg').value);
    const water = parseFloat(document.getElementById('vial-water').value);
    const assign = document.getElementById('vial-assign').value;
    const dose = parseFloat(document.getElementById('vial-dose').value);
    const date = document.getElementById('vial-date').value;

    if (!peptide || !mg || !water || !assign || !dose || !date) {
        alert('Please fill in all fields.');
        return;
    }

    state.lab.mixedVials.push({
        id: generateId(),
        peptide, vialMg: mg, waterMl: water,
        assignedTo: assign, doseMg: dose,
        mixedDate: date, depleted: false
    });

    // Decrement inventory if there's a matching item
    const invKey = Object.keys(state.lab.inventory).find(k => k.toLowerCase().includes(peptide.toLowerCase()));
    if (invKey && state.lab.inventory[invKey] > 0) {
        state.lab.inventory[invKey]--;
    }

    saveState();
    renderLab();
}

function depleteVial(id) {
    if (!confirm('Mark this vial as depleted/empty?')) return;
    const vial = state.lab.mixedVials.find(v => v.id === id);
    if (vial) vial.depleted = true;
    saveState();
    renderLab();
}

function updateInventory(item, delta) {
    if (!state.lab.inventory[item] && state.lab.inventory[item] !== 0) state.lab.inventory[item] = 0;
    state.lab.inventory[item] = Math.max(0, state.lab.inventory[item] + delta);
    saveState();
    renderLab();
}

function renderWorkoutPlan() {

                <div class="font-bold ${isCurrent ? 'text-amber-400' : 'text-gray-400'} mb-2">Week ${week.week}: ${week.name} ${isCurrent ? '(Current)' : ''}</div>

            </div>`;
        });

    } else if (currentUser === 'karen') {
        html += `<div class="card">
            <div class="section-title">Treadmill Incline Progression</div>
            <div class="text-sm text-gray-400 mb-1">Week ${Math.min(wk, 12)} &bull; 8 lb weighted vest &bull; No handrails</div>
            <div class="text-xs text-gray-600 mb-4">&#x26A0; STRICTLY treadmill walking only. No calisthenics.</div>`;

        KAREN_TREADMILL.forEach(tier => {
            const isCurrent = tier.weeks.includes(Math.min(wk, 12));
            html += `<div class="mb-3 p-3 rounded-lg ${isCurrent ? 'bg-amber-900/20 border border-amber-800' : 'bg-gray-800'}">
                <div class="font-bold ${isCurrent ? 'text-amber-400' : 'text-gray-400'} mb-2">${tier.tier} ${isCurrent ? '(Current)' : ''}</div>
                <div class="text-xs text-gray-500 mb-2">Weeks ${tier.weeks[0]}-${tier.weeks[tier.weeks.length-1]}</div>
                <div class="grid grid-cols-2 gap-2 text-sm">
                    <div><span class="text-gray-500">Duration:</span> <span class="text-white">${tier.duration}</span></div>
                    <div><span class="text-gray-500">Incline:</span> <span class="text-white">${tier.incline}</span></div>
                    <div><span class="text-gray-500">Speed:</span> <span class="text-white">${tier.speed}</span></div>
                    <div><span class="text-gray-500">Sessions:</span> <span class="text-white">${tier.sessions}x/week</span></div>
                </div>
            </div>`;
        });
        html += '</div>';

        html += `<div class="card">
            <div class="section-title">Weekly Schedule</div>
            <div class="space-y-2 text-sm">
                ${Object.entries(KAREN_SCHEDULE).map(([d, s]) => {
                    const isToday = parseInt(d) === dayOfWeek();
                    return `<div class="flex items-center gap-3 p-2 rounded-lg ${isToday ? 'bg-amber-900/30 border border-amber-700' : ''}">
                        <span class="w-10 font-bold ${isToday ? 'text-amber-400' : 'text-gray-500'}">${DAYS_SHORT[d]}</span>
                        <span class="text-gray-300 flex-1">${s.peptide}</span>
                        <span class="text-gray-500 text-xs">${s.workout}</span>
                    </div>`;

    } else {
        html += `<div class="card"><div class="text-gray-500 text-center py-8">Custom workout plan not configured for this user.</div></div>`;
    }

    document.getElementById('workout-content').innerHTML = html;
}

    const user = state.users[currentUser];

    let html = `<div class="text-center mb-4">
        <div class="text-4xl mb-2">&#x1F6AB;</div>
        <h3 class="text-xl font-bold text-red-500">NO-GO FOODS</h3>
        <p class="text-gray-500 text-sm">Do not consume these items</p>
    </div>
    <div class="space-y-3">`;

    if (Array.isArray(foods) && foods.length > 0 && typeof foods[0] === 'object') {
        foods.forEach(f => {
            html += `<div class="flex items-center gap-3 p-3 rounded-lg ${f.alert ? 'bg-red-900/60 border-2 border-red-500' : 'bg-gray-800 border border-gray-700'}">
                <span class="text-2xl">${f.icon}</span>
                <span class="${f.alert ? 'text-red-300 font-bold' : 'text-gray-200'}">${f.text}</span>
            </div>`;
        });

        foods.forEach(f => {
            html += `<div class="flex items-center gap-3 p-3 bg-gray-800 border border-gray-700 rounded-lg">
                <span class="text-2xl">&#x1F6AB;</span>
                <span class="text-gray-200">${f}</span>
            </div>`;
        });
    }

    html += `</div>
    <button onclick="closeModal()" class="btn-secondary mt-6">Got It</button>`;

    showModal(html);
}

function addNewUser() {
    const name = document.getElementById('new-name').value.trim();
    const start = parseFloat(document.getElementById('new-start').value);
    const goal = parseFloat(document.getElementById('new-goal').value);
    const cal = parseInt(document.getElementById('new-cal').value);
    const protein = parseInt(document.getElementById('new-protein').value);
    const peptide = document.getElementById('new-peptide').value;

    if (!name || !start || !goal || !cal || !protein) {
        alert('Please fill in all fields.');
        return;
    }

    const id = name.toLowerCase().replace(/[^a-z0-9]/g, '');
    if (state.users[id]) {
        alert('A user with a similar name already exists.');
        return;
    }

    state.users[id] = {
        id, name, isAdmin: false,
        startWeight: start, goalWeight: goal,
        calorieTarget: cal, proteinMin: protein, proteinMax: Math.round(protein * 1.1),
        fiberTarget: 0, waterTarget: 80,
        peptideType: peptide,
        noGoFoods: ['Fried foods', 'Carbonated drinks', 'Liquid sugar'],
        warningThreshold: 2,
        programStart: todayStr(),
        created: Date.now()
    };

    saveState();
    closeModal();
    renderUserSelect();
}

function renderSettings() {
    const user = state.users[currentUser];
    let html = '';

    // User profile summary
    html += `<div class="card">
        <div class="section-title">Profile</div>
        <div class="space-y-2 text-sm">
            <div class="flex justify-between"><span class="text-gray-400">Name</span><span class="text-white">${user.name}</span></div>
            <div class="flex justify-between"><span class="text-gray-400">Start Weight</span><span class="text-white">${user.startWeight} lbs</span></div>
            <div class="flex justify-between"><span class="text-gray-400">Goal Weight</span><span class="text-white">${user.goalWeight} lbs</span></div>
            <div class="flex justify-between"><span class="text-gray-400">Calories</span><span class="text-white">${user.calorieTarget} kcal</span></div>
            <div class="flex justify-between"><span class="text-gray-400">Protein</span><span class="text-white">${user.proteinMin}-${user.proteinMax}g</span></div>
            <div class="flex justify-between"><span class="text-gray-400">Water</span><span class="text-white">${user.waterTarget} oz</span></div>
            <div class="flex justify-between"><span class="text-gray-400">Peptides</span><span class="text-white text-right text-xs">${user.peptideType || 'N/A'}</span></div>
            <div class="flex justify-between"><span class="text-gray-400">Program Start</span><span class="text-white">${user.programStart ? formatDate(user.programStart) : 'N/A'}</span></div>
            <div class="flex justify-between"><span class="text-gray-400">Current Week</span><span class="text-amber-400 font-bold">${weekNumber(currentUser)}</span></div>
        </div>
    </div>`;

    // Backup & Restore
    html += `<div class="card">
        <div class="section-title">Backup &amp; Restore</div>
        <p class="text-xs text-gray-500 mb-3">Export your data as JSON to keep a backup. Essential for GitHub Pages since localStorage can be cleared.</p>
        <button onclick="exportData()" class="btn-primary mb-3">&#x1F4BE; Export Backup (JSON)</button>
        <button onclick="document.getElementById('import-input').click()" class="btn-secondary">&#x1F4C2; Import Backup</button>
    </div>`;

    // Admin: Change passcode
    if (user.isAdmin) {
        html += `<div class="card">
            <div class="section-title">Admin Settings</div>
            <button onclick="promptPasscode('changePasscode')" class="btn-secondary mb-3">&#x1F510; Change Passcode</button>
            <button onclick="showDeleteUserPicker()" class="btn-danger">&#x1F5D1; Remove a User</button>
        </div>`;
    }

    // Log history
    const logs = state.logs[currentUser] || {};
    const dates = Object.keys(logs).sort((a, b) => b.localeCompare(a)).slice(0, 14);
    if (dates.length > 0) {
        html += `<div class="card">
            <div class="section-title">Recent Log History</div>
            <div class="space-y-1 text-sm">`;
        dates.forEach(d => {
            const l = logs[d];
            html += `<div class="flex justify-between items-center py-1 border-b border-gray-800">
                <span class="text-gray-400">${formatDate(d)}</span>
                <span class="text-gray-500 text-xs">
                    ${l.weight ? l.weight + 'lb' : ''}
                    ${l.calories ? l.calories + 'cal' : ''}
                    ${l.protein ? l.protein + 'g' : ''}
                    ${l.workout?.completed ? '&#x2705;' : ''}
                </span>
            </div>`;
        });
        html += '</div></div>';
    }

    document.getElementById('settings-content').innerHTML = html;
}

function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `peptide-cc-backup-${todayStr()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function handleImport(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const imported = JSON.parse(e.target.result);
            if (!imported.users || !imported.logs) {
                alert('Invalid backup file.');
                return;
            }
            if (confirm('This will replace ALL current data. Continue?')) {
                state = imported;
                saveState();
                currentUser = null;
                showScreen('select');
                alert('Backup restored successfully!');
            }
        } catch (err) {
            alert('Failed to read backup file: ' + err.message);
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function showChangePasscodeForm() {
    const html = `
        <h3 class="text-xl font-bold text-white mb-4">Change Passcode</h3>
        <div class="space-y-3">
            <div>
                <label class="label">New 4-Digit Passcode</label>
                <input type="password" inputmode="numeric" maxlength="4" pattern="[0-9]*" class="input-field text-center text-2xl tracking-[0.5em]" id="new-passcode" placeholder="****">
            </div>
            <div>
                <label class="label">Confirm Passcode</label>
                <input type="password" inputmode="numeric" maxlength="4" pattern="[0-9]*" class="input-field text-center text-2xl tracking-[0.5em]" id="confirm-passcode" placeholder="****">
            </div>
            <button onclick="saveNewPasscode()" class="btn-primary">Save Passcode</button>
            <button onclick="closeModal()" class="btn-secondary">Cancel</button>
        </div>`;
    showModal(html);
}

function saveNewPasscode() {
    const newPin = document.getElementById('new-passcode').value;
    const confirm = document.getElementById('confirm-passcode').value;
    if (newPin.length !== 4 || !/^\d{4}$/.test(newPin)) {
        alert('Passcode must be exactly 4 digits.');
        return;
    }
    if (newPin !== confirm) {
        alert('Passcodes do not match.');
        return;
    }
    state.passcode = newPin;
    saveState();
    closeModal();
    alert('Passcode updated!');
}

function showDeleteUserPicker() {
    const nonAdmin = Object.values(state.users).filter(u => !u.isAdmin);
    if (nonAdmin.length === 0) {
        alert('No non-admin users to remove.');
        return;
    }
    let html = `<h3 class="text-xl font-bold text-white mb-4">Remove a User</h3><div class="space-y-2">`;
    nonAdmin.forEach(u => {
        html += `<button onclick="deleteUser('${u.id}')" class="w-full bg-gray-800 hover:bg-red-900/50 border border-gray-700 hover:border-red-600 rounded-xl p-4 text-left transition">
            <div class="font-bold text-white">${u.name}</div>
            <div class="text-xs text-gray-500">This will delete all their logs</div>
        </button>`;
    });
    html += `<button onclick="closeModal()" class="btn-secondary mt-2">Cancel</button></div>`;
    showModal(html);
}

function deleteUser(id) {
    if (!confirm(`Delete ${state.users[id]?.name || id} and all their data? This cannot be undone.`)) return;
    delete state.users[id];
    delete state.logs[id];
    state.lab.mixedVials = state.lab.mixedVials.filter(v => v.assignedTo !== id);
    saveState();
    closeModal();
    renderUserSelect();
}
